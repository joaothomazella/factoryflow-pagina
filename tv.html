<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactoryFlow TV</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #020617;
  color: #e2e8f0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  overflow: hidden;
}

/* ============================================================
   BACKGROUND
   ============================================================ */
.tv-bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(59,130,246,.12) 0%, transparent 60%),
              radial-gradient(ellipse 50% 40% at 100% 100%, rgba(139,92,246,.08) 0%, transparent 50%),
              radial-gradient(ellipse 40% 30% at 0% 100%, rgba(6,182,212,.06) 0%, transparent 50%),
              #020617;
}

.tv-grid-overlay {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(59,130,246,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,.035) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ============================================================
   AUTH SCREEN
   ============================================================ */
.tv-auth {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1.2rem; padding: 2rem;
}

.tv-auth-box {
  background: rgba(15,23,42,.96);
  border: 1px solid rgba(59,130,246,.25);
  border-radius: 24px;
  padding: 2.5rem 3rem;
  width: 100%; max-width: 420px;
  box-shadow: 0 32px 80px rgba(0,0,0,.5);
  display: flex; flex-direction: column; align-items: center; gap: 1.4rem;
}

.tv-auth-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(139,92,246,.15));
  border: 1px solid rgba(59,130,246,.3);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; color: #60a5fa;
}

.tv-auth-box h2 { font-size: 1.5rem; font-weight: 800; color: #fff; text-align: center; }
.tv-auth-box p  { color: #64748b; font-size: .85rem; text-align: center; }

.tv-auth-form { width: 100%; display: flex; flex-direction: column; gap: .7rem; }

.tv-auth-form input {
  width: 100%; padding: .75rem 1rem;
  background: rgba(30,41,59,.8);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px; color: #fff; font-size: .95rem;
  outline: none; transition: border-color .2s;
}
.tv-auth-form input:focus { border-color: rgba(59,130,246,.6); }

.tv-auth-error {
  color: #fb7185; font-size: .82rem; text-align: center;
  background: rgba(251,113,133,.08); border: 1px solid rgba(251,113,133,.2);
  border-radius: 8px; padding: .5rem;
}

.tv-auth-btn {
  padding: .75rem;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  border: none; border-radius: 12px; color: #fff;
  font-size: .95rem; font-weight: 700; cursor: pointer;
  transition: opacity .2s;
}
.tv-auth-btn:hover { opacity: .9; }
.tv-auth-back { color: #3b82f6; font-size: .8rem; text-decoration: none; }

/* ============================================================
   LOADING
   ============================================================ */
.tv-loading {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1rem;
}
.tv-loading-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(139,92,246,.15));
  border: 1px solid rgba(59,130,246,.3);
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; color: #60a5fa;
  animation: tvpulse 2s ease-in-out infinite;
}
@keyframes tvpulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.7; transform:scale(.96); } }
.tv-loading h2 { font-size: 1.4rem; font-weight: 800; color: #fff; }
.tv-loading p  { color: #64748b; font-size: .85rem; }
.tv-loading-bar { width: 220px; height: 4px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
.tv-loading-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); animation: loadbar 2s ease-in-out infinite; }
@keyframes loadbar { 0% { width:0%;margin-left:0%; } 50% { width:70%;margin-left:15%; } 100% { width:0%;margin-left:100%; } }

/* ============================================================
   MAIN WRAPPER
   ============================================================ */
.tv-wrapper {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ============================================================
   TOP BAR
   ============================================================ */
.tv-topbar {
  flex-shrink: 0; height: 56px;
  display: flex; align-items: center; gap: 1rem;
  padding: 0 1rem;
  background: rgba(2,6,23,.88);
  border-bottom: 1px solid rgba(255,255,255,.07);
  backdrop-filter: blur(20px); z-index: 10;
}

.tv-brand { display: flex; align-items: center; gap: .6rem; flex-shrink: 0; }
.tv-brand-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, rgba(59,130,246,.25), rgba(139,92,246,.2));
  border: 1px solid rgba(59,130,246,.3);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #60a5fa; font-size: 1rem;
}
.tv-brand h1 { font-size: .95rem; font-weight: 900; letter-spacing: .5px; color: #fff; line-height: 1.1; }
.tv-brand p  { font-size: .6rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }

.tv-topbar-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 1.2rem; }
.tv-clock { font-size: 1.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; letter-spacing: .5px; }
.tv-date  { font-size: .65rem; color: #64748b; font-weight: 600; text-align: center; }

.tv-page-tabs { display: flex; gap: .3rem; overflow: hidden; max-width: 500px; }
.tv-page-tab {
  height: 24px; padding: 0 .55rem;
  border-radius: 6px; background: rgba(255,255,255,.04);
  border: 1px solid transparent; color: #475569;
  font-size: .58rem; font-weight: 700;
  display: flex; align-items: center; gap: .28rem;
  text-transform: uppercase; letter-spacing: .4px;
  transition: all .3s; white-space: nowrap; flex-shrink: 0;
}
.tv-page-tab.active { background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.3); color: #93c5fd; }

.tv-topbar-right { flex-shrink: 0; display: flex; align-items: center; gap: .6rem; }
.tv-live-badge {
  display: flex; align-items: center; gap: .4rem;
  font-size: .65rem; font-weight: 800; color: #4ade80;
  background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25);
  border-radius: 99px; padding: .28rem .7rem;
  text-transform: uppercase; letter-spacing: .5px;
}
.tv-live-dot {
  width: 7px; height: 7px; background: #4ade80; border-radius: 50%;
  animation: livepulse 1.5s ease-in-out infinite;
}
@keyframes livepulse { 0%,100% { opacity:1;transform:scale(1); } 50% { opacity:.5;transform:scale(.7); } }
.tv-back-link { color: #475569; font-size: .72rem; text-decoration: none; display: flex; align-items: center; gap: .3rem; }
.tv-back-link:hover { color: #e2e8f0; }

/* ============================================================
   CONTENT AREA
   ============================================================ */
.tv-content { flex: 1; min-height: 0; overflow: hidden; position: relative; }

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */
.tv-panel-header {
  height: 40px; min-height: 40px;
  display: flex; align-items: center; gap: .5rem;
  padding: 0 .9rem; border-bottom: 1px solid rgba(255,255,255,.07);
  background: rgba(255,255,255,.025);
  font-size: .72rem; font-weight: 800; color: #e2e8f0;
  letter-spacing: .6px; text-transform: uppercase;
}
.tv-panel-header i { color: #64748b; }

.tv-empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: .5rem; color: #475569; font-size: .75rem; font-weight: 700;
}
.tv-empty-state i { font-size: 1.8rem; opacity: .35; }

/* ============================================================
   PAGE: VISAO GERAL (METRICS)
   ============================================================ */
.tv-metrics-page {
  width: 100%; height: 100%;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: .55rem; padding: .6rem; overflow: hidden;
}

/* KPI bar - 8 cards */
.tv-kpi-bar {
  display: grid; grid-template-columns: repeat(8, minmax(0, 1fr)); gap: .5rem;
}

.tv-kpi-card {
  border-radius: 16px; padding: .85rem .7rem;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: .32rem; background: rgba(15,23,42,.9);
  border: 1px solid rgba(255,255,255,.07);
  transition: transform .2s; cursor: default;
}
.tv-kpi-card:hover { transform: translateY(-1px); }

.tv-kpi-icon {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; font-size: .9rem;
}
.tv-kpi-value { font-size: 2rem; font-weight: 900; line-height: 1; letter-spacing: -.5px; }
.tv-kpi-label { font-size: .58rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; text-align: center; }

.tv-kpi-card.k-blue    { border-color: rgba(59,130,246,.2); }
.tv-kpi-card.k-blue    .tv-kpi-icon  { background: rgba(59,130,246,.15); color: #60a5fa; }
.tv-kpi-card.k-blue    .tv-kpi-value { color: #60a5fa; }
.tv-kpi-card.k-green   { border-color: rgba(34,197,94,.2); }
.tv-kpi-card.k-green   .tv-kpi-icon  { background: rgba(34,197,94,.12); color: #4ade80; }
.tv-kpi-card.k-green   .tv-kpi-value { color: #4ade80; }
.tv-kpi-card.k-yellow  { border-color: rgba(250,204,21,.2); }
.tv-kpi-card.k-yellow  .tv-kpi-icon  { background: rgba(250,204,21,.12); color: #fde047; }
.tv-kpi-card.k-yellow  .tv-kpi-value { color: #fde047; }
.tv-kpi-card.k-slate   { border-color: rgba(100,116,139,.15); }
.tv-kpi-card.k-slate   .tv-kpi-icon  { background: rgba(100,116,139,.1); color: #94a3b8; }
.tv-kpi-card.k-slate   .tv-kpi-value { color: #94a3b8; }
.tv-kpi-card.k-emerald { border-color: rgba(16,185,129,.2); }
.tv-kpi-card.k-emerald .tv-kpi-icon  { background: rgba(16,185,129,.12); color: #34d399; }
.tv-kpi-card.k-emerald .tv-kpi-value { color: #34d399; }
.tv-kpi-card.k-orange  { border-color: rgba(249,115,22,.2); }
.tv-kpi-card.k-orange  .tv-kpi-icon  { background: rgba(249,115,22,.12); color: #fb923c; }
.tv-kpi-card.k-orange  .tv-kpi-value { color: #fb923c; }
.tv-kpi-card.k-red     { border-color: rgba(239,68,68,.2); }
.tv-kpi-card.k-red     .tv-kpi-icon  { background: rgba(239,68,68,.12); color: #f87171; }
.tv-kpi-card.k-red     .tv-kpi-value { color: #f87171; }
.tv-kpi-card.k-purple  { border-color: rgba(139,92,246,.2); }
.tv-kpi-card.k-purple  .tv-kpi-icon  { background: rgba(139,92,246,.12); color: #a78bfa; }
.tv-kpi-card.k-purple  .tv-kpi-value { color: #a78bfa; }

/* Middle: sectors + alerts */
.tv-metrics-middle {
  display: grid; grid-template-columns: 1fr 320px;
  gap: .55rem; min-height: 0; overflow: hidden;
}

.tv-sectors-panel {
  border-radius: 16px; background: rgba(15,23,42,.85);
  border: 1px solid rgba(255,255,255,.07);
  overflow: hidden; display: flex; flex-direction: column;
}

.tv-sectors-grid {
  flex: 1; min-height: 0; overflow: hidden; padding: .55rem;
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: .42rem; align-content: start;
}

.tv-sec-row {
  border-radius: 11px; padding: .52rem .6rem;
  background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
  display: flex; flex-direction: column; gap: .32rem;
}

.tv-sec-row-top {
  display: flex; align-items: center; justify-content: space-between; gap: .4rem;
}
.tv-sec-row-name {
  display: flex; align-items: center; gap: .38rem;
  font-size: .64rem; font-weight: 800; color: #e2e8f0;
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tv-sec-row-count { font-size: 1.15rem; font-weight: 900; flex-shrink: 0; }
.tv-sec-badges    { display: flex; gap: .28rem; flex-wrap: wrap; }
.tv-sec-badge {
  font-size: .5rem; font-weight: 800; padding: .1rem .28rem;
  border-radius: 5px; text-transform: uppercase; letter-spacing: .3px;
}
.tv-sec-badge.sw { background: rgba(34,197,94,.12); color: #4ade80; }
.tv-sec-badge.sp { background: rgba(250,204,21,.12); color: #fde047; }
.tv-sec-badge.su { background: rgba(239,68,68,.12);  color: #f87171; }
.tv-sec-badge.sl { background: rgba(249,115,22,.12); color: #fb923c; }

.tv-sec-bar-track {
  height: 5px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; display: flex;
}
.tv-sbar-w { background: #22c55e; border-radius: 99px; transition: width .5s; }
.tv-sbar-p { background: #f59e0b; border-radius: 99px; transition: width .5s; }
.tv-sbar-i { flex: 1; }

/* Right: alerts */
.tv-alert-panel {
  border-radius: 16px; background: rgba(15,23,42,.85);
  border: 1px solid rgba(239,68,68,.15);
  overflow: hidden; display: flex; flex-direction: column;
}
.tv-alert-list {
  flex: 1; min-height: 0; overflow: hidden; padding: .5rem;
  display: flex; flex-direction: column; gap: .35rem;
}
.tv-alert-item {
  display: flex; align-items: center; gap: .5rem;
  padding: .45rem .55rem; border-radius: 10px;
  background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.14);
}
.tv-alert-num    { font-size: .8rem; font-weight: 900; color: #fff; flex-shrink: 0; }
.tv-alert-info   { min-width: 0; flex: 1; }
.tv-alert-client { font-size: .6rem; color: #bfdbfe; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tv-alert-sector { font-size: .54rem; color: #64748b; font-weight: 600; }
.tv-alert-time   { font-size: .78rem; font-weight: 900; color: #f87171; flex-shrink: 0; }

/* Bottom: deliveries */
.tv-deliveries-bar {
  border-radius: 16px; background: rgba(15,23,42,.85);
  border: 1px solid rgba(255,255,255,.07); overflow: hidden;
}
.tv-deliveries-list { display: flex; gap: .45rem; padding: .5rem .6rem; overflow: hidden; }
.tv-delivery-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: .5rem;
  padding: .38rem .6rem; border-radius: 10px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
}
.tv-deliv-order  { font-size: .7rem; font-weight: 900; color: #fff; }
.tv-deliv-client { font-size: .58rem; color: #9fc5ff; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
.tv-deliv-date   { font-size: .62rem; font-weight: 900; padding: .1rem .32rem; border-radius: 6px; flex-shrink: 0; }
.tv-deliv-date.dl { background: rgba(239,68,68,.15); color: #f87171; }
.tv-deliv-date.dt { background: rgba(250,204,21,.15); color: #fde047; }
.tv-deliv-date.ds { background: rgba(59,130,246,.12); color: #93c5fd; }

/* ============================================================
   LOT CARDS (used in all pages)
   ============================================================ */
.tv-lot-card {
  border-radius: 11px; padding: .45rem .52rem;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-left: 3px solid transparent; flex-shrink: 0;
}
.tv-lot-card.priority-sameday { border-left-color: #ef4444; background: rgba(127,29,29,.12); }
.tv-lot-card.priority-urgent  { border-left-color: #f59e0b; }
.tv-lot-card.priority-normal  { border-left-color: #22c55e; }
.tv-lot-card.late-lot         { border-left-color: #ef4444; }

.tv-card-top { display: flex; align-items: center; justify-content: space-between; gap: .4rem; margin-bottom: .28rem; }
.tv-lot-number { font-size: .78rem; font-weight: 900; color: #fff; display: flex; align-items: center; gap: .3rem; }
.tv-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tv-status-dot.working { background: #22c55e; animation: livepulse 1.5s infinite; }
.tv-status-dot.paused  { background: #f59e0b; }
.tv-priority-tag { font-size: .44rem; font-weight: 900; padding: .1rem .28rem; border-radius: 5px; text-transform: uppercase; flex-shrink: 0; }
.tv-priority-tag.sameday { background: rgba(239,68,68,.18); color: #f87171; }
.tv-priority-tag.urgent  { background: rgba(245,158,11,.15); color: #fbbf24; }
.tv-lot-client  { font-size: .6rem; color: #9fc5ff; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .2rem; }
.tv-lot-paint   { font-size: .58rem; color: #64748b; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .26rem; }
.tv-card-meta   { display: flex; align-items: center; gap: .28rem; flex-wrap: wrap; }
.tv-meta-chip   { font-size: .48rem; font-weight: 800; padding: .1rem .26rem; border-radius: 5px; }
.tv-meta-chip.mtype  { background: rgba(59,130,246,.1); color: #93c5fd; }
.tv-meta-chip.mtime  { background: rgba(255,255,255,.06); color: #94a3b8; }
.tv-meta-chip.mtime.alert { background: rgba(239,68,68,.12); color: #f87171; }
.tv-meta-chip.mdate  { background: rgba(255,255,255,.05); color: #94a3b8; }
.tv-meta-chip.mlate  { background: rgba(239,68,68,.12); color: #f87171; }
.tv-meta-chip.mtoday { background: rgba(250,204,21,.12); color: #fde047; }
.tv-time-bar { height: 4px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; display: flex; margin-top: .3rem; }
.tv-tbar-w { background: #22c55e; border-radius: 99px; }
.tv-tbar-p { background: #f59e0b; border-radius: 99px; }
.tv-tbar-i { flex: 1; }

.tv-empty-col {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: .4rem; color: #475569; font-size: .68rem; font-weight: 700;
}
.tv-empty-col i { font-size: 1.4rem; opacity: .3; }

/* Focus cards (larger, for priorities side panel) */
.tv-focus-card {
  border-radius: 13px; padding: .55rem .65rem;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); flex-shrink: 0;
}
.tv-focus-card.danger { background: rgba(127,29,29,.1); border-color: rgba(239,68,68,.2); }
.tv-focus-top    { display: flex; align-items: center; justify-content: space-between; gap: .4rem; margin-bottom: .32rem; }
.tv-focus-num    { font-size: .9rem; font-weight: 900; color: #fff; }
.tv-focus-badge  { font-size: .48rem; font-weight: 900; padding: .12rem .4rem; border-radius: 99px; text-transform: uppercase; }
.tv-focus-client { font-size: .68rem; color: #9fc5ff; font-weight: 800; margin-bottom: .2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tv-focus-paint  { font-size: .6rem; color: #64748b; font-weight: 600; margin-bottom: .32rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tv-focus-meta   { display: flex; gap: .32rem; flex-wrap: wrap; }

/* ============================================================
   PAGE: PRODUCTION FOCUS
   ============================================================ */
.tv-production-page {
  width: 100%; height: 100%;
  display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)) 210px;
  gap: .5rem; padding: .5rem; overflow: hidden;
}

.tv-prod-col {
  border-radius: 16px; background: rgba(15,23,42,.88);
  border: 1px solid rgba(255,255,255,.07);
  overflow: hidden; display: flex; flex-direction: column;
}

.tv-col-head {
  height: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 .7rem; border-bottom: 1px solid rgba(255,255,255,.07);
  background: rgba(255,255,255,.03);
}
.tv-col-title {
  display: flex; align-items: center; gap: .4rem;
  font-size: .66rem; font-weight: 800;
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tv-col-count {
  font-size: .72rem; font-weight: 900; min-width: 24px; height: 22px;
  background: rgba(255,255,255,.07); border-radius: 6px; padding: 0 .38rem;
  display: flex; align-items: center; justify-content: center;
}
.tv-col-body {
  flex: 1; min-height: 0; overflow: hidden; padding: .38rem;
  display: flex; flex-direction: column; gap: .32rem;
}
.tv-col-footer {
  height: 26px; min-height: 26px;
  display: flex; align-items: center; gap: .5rem; padding: 0 .7rem;
  border-top: 1px solid rgba(255,255,255,.06); background: rgba(255,255,255,.015);
  font-size: .52rem; color: #64748b; font-weight: 700;
}
.tv-col-footer .tw { color: #4ade80; }
.tv-col-footer .tp { color: #fde047; }

  if (!s) return '';
  if (s === 'envase_produzir' || s === 'envase_enlatamento') return s;
  if (s === 'envase_producao' || s === 'envase_produção') return 'envase_produzir';
  if (s === 'enlatamento') return 'envase_enlatamento';
  if (s === 'envase' || s === 'envase_antigo') {
    const t = String((lot && (lot.productType || lot.tipo)) || '').toLowerCase();
    return t === 'diluente' ? 'envase_produzir' : 'envase_enlatamento';
  }
  return s;
}

function tvNormLot(lot) {
  if (!lot) return lot;
  lot.sector = tvNS(lot.sector || lot.stage || lot.status, lot);
  if (Array.isArray(lot.workSessions)) lot.workSessions = lot.workSessions.map(s => ({...s, sector: tvNS(s.sector, lot)}));
  if (Array.isArray(lot.history))      lot.history      = lot.history.map(h => ({...h, sector: tvNS(h.sector, lot)}));
  return lot;
}

// ---- Data loading ----
async function tvLoadData() {
  await loadBridgeLots({ limit: 500, force: true, timeout: 12000 });
  const [routesRaw, ordersRaw] = await Promise.all([
    tvApiGet('ff_routes').catch(() => []),
    tvApiGet('ff_orders').catch(() => [])
  ]);
  if (!STATE._bridgeConnected) throw new Error('Nao foi possivel conectar a producao.');
  tvState.lots   = (STATE.lots || []).map(tvNormLot).filter(l => !l.rejected);
  tvState.orders = Array.isArray(ordersRaw) ? ordersRaw : [];
  tvState.routes = (Array.isArray(routesRaw) ? routesRaw : []).map(r => {
    let lots = [];
    try { lots = typeof r.lots === 'string' ? JSON.parse(r.lots) : (r.lots || []); } catch(e){}
    return { ...r, lots };
  });
}

// ---- Time helpers ----
function tvIsLate(lot) {
  const s = tvNS(lot.sector, lot);
  if (['entregue','entrega'].includes(s)) return false;
  if (!lot.deliveryDate) return false;
  return lot.deliveryDate < new Date().toISOString().split('T')[0];
}
function tvIsToday(d)    { return !!d && d === new Date().toISOString().split('T')[0]; }

function tvGetTS(lot) {
  const sector  = tvNS(lot.sector, lot);
  const entered = Number(lot.sectorEnteredAt) || Number(lot.createdAt) || Date.now();
  const now     = Date.now();
  const total   = Math.max(0, now - entered);
  const sessions = (Array.isArray(lot.workSessions) ? lot.workSessions : [])
    .filter(s => tvNS(s.sector, lot) === sector)
    .sort((a, b) => a.start - b.start);
  const worked = sessions.reduce((acc, s) => acc + Math.max(0, (s.end || now) - s.start), 0);
  let paused = 0;
  for (let i = 1; i < sessions.length; i++) {
    if (sessions[i-1].end) paused += Math.max(0, sessions[i].start - sessions[i-1].end);
  }
  if (lot.lotStatus === 'paused' && sessions.length > 0) {
    const le = sessions[sessions.length-1].end;
    if (le) paused += Math.max(0, now - le);
  }
  return { total, worked, paused };
}

function tvTInSec(lot) {
  const e = Number(lot.sectorEnteredAt) || Number(lot.createdAt) || 0;
  return e ? Date.now() - e : 0;
}

function tvFmtMs(ms) {
  if (!ms || ms < 0) return '0m';
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h}h${m > 0 ? m + 'm' : ''}` : `${m}m`;
}

function tvFmtDate(d) {
  if (!d) return '–';
  const [,mo,dd] = d.split('-');
  return `${dd}/${mo}`;
}

function tvE(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

function tvGetAlerts() {
  return tvState.lots.filter(l => {
    const s = tvNS(l.sector, l);
    return !['entrega','entregue'].includes(s) && tvTInSec(l) > 7200000;
  });
}

function tvSecStats(sector) {
  const lots = tvState.lots.filter(l => tvNS(l.sector, l) === sector);
  return {
    total:   lots.length,
    working: lots.filter(l => l.lotStatus === 'working').length,
    paused:  lots.filter(l => l.lotStatus === 'paused').length,
    urgent:  lots.filter(l => ['urgent','sameday'].includes(l.priority)).length,
    late:    lots.filter(l => tvIsLate(l)).length
  };
}

function tvLotKey(lot) {
  return String(lot.orderNumber || lot.order || lot.pedido || lot.pits_pedido || lot.orderId || lot.order_id || lot.number || '').trim();
}

function tvGroupByOrder(lots) {
  const map = new Map();
  lots.forEach(lot => {
    const key = tvLotKey(lot) || String(lot.client || lot.number || 'Pedido');
    if (!map.has(key)) map.set(key, { order: key, client: lot.client || 'Cliente', city: lot.city || '', deliveryDate: lot.deliveryDate || '', priority: lot.priority || 'normal', lots: [] });
    const item = map.get(key);
    item.lots.push(lot);
    if (lot.priority === 'sameday' || (lot.priority === 'urgent' && item.priority !== 'sameday')) item.priority = lot.priority;
    if (!item.deliveryDate && lot.deliveryDate) item.deliveryDate = lot.deliveryDate;
    if (!item.city && lot.city) item.city = lot.city;
  });
  const po = { sameday: 0, urgent: 1, normal: 2 };
  return [...map.values()].sort((a, b) => {
    const d = (po[a.priority] ?? 2) - (po[b.priority] ?? 2);
    return d !== 0 ? d : String(a.deliveryDate || '').localeCompare(String(b.deliveryDate || ''));
  });
}

function tvInRoute(lot, routes) {
  return routes.some(r => {
    if (!['in_progress','active','started','em_rota'].includes(String(r.status || '').toLowerCase())) return false;
    return (Array.isArray(r.lots) ? r.lots : []).some(x =>
      String(x.lotId || x.id || x.number || '') === String(lot.id || lot.number || '')
    );
  });
}

function tvBuildLotCard(lot) {
  const ts     = tvGetTS(lot);
  const late   = tvIsLate(lot);
  const today  = tvIsToday(lot.deliveryDate);
  const track  = TV_TRACKABLE.includes(lot.sector);
  const alert  = ts.total > 7200000;
  const status = lot.lotStatus || 'idle';
  const pt     = lot.productType || 'tinta';
  const wPct   = ts.total ? Math.min(100, Math.round(ts.worked / ts.total * 100)) : 0;
  const pPct   = ts.total ? Math.min(100 - wPct, Math.round(ts.paused / ts.total * 100)) : 0;

  const ptag = lot.priority === 'sameday' ? `<div class="tv-priority-tag sameday">HOJE</div>`
             : lot.priority === 'urgent'  ? `<div class="tv-priority-tag urgent">URG</div>` : '';
  const sdot = status === 'working' ? `<span class="tv-status-dot working"></span>`
             : status === 'paused'  ? `<span class="tv-status-dot paused"></span>` : '';

  return `
    <div class="tv-lot-card priority-${lot.priority||'normal'} ${late?'late-lot':''}">
      ${ptag}
      <div class="tv-card-top"><div class="tv-lot-number">${sdot}#${tvE(lot.number||'')}</div></div>
      <div class="tv-lot-client">${tvE(lot.client||'')}</div>
      <div class="tv-lot-paint">${tvE(lot.paint||lot.productCode||'')} &middot; ${tvE(lot.qty||'')}${tvE(lot.unit||'Kg')}</div>
      <div class="tv-card-meta">
        <span class="tv-meta-chip mtype">${PT_LABELS[pt]||pt}</span>
        <span class="tv-meta-chip mtime${alert?' alert':''}"><i class="fas fa-clock"></i> ${tvFmtMs(ts.total)}</span>
        <span class="tv-meta-chip mdate ${late?'mlate':today?'mtoday':''}">${late?'&#9888;':today?'&#128197;':''}${tvFmtDate(lot.deliveryDate)}</span>
      </div>
      ${track && ts.total > 0 ? `<div class="tv-time-bar"><div class="tv-tbar-w" style="width:${wPct}%"></div><div class="tv-tbar-p" style="width:${pPct}%"></div><div class="tv-tbar-i"></div></div>` : ''}
    </div>`;
}

function tvBuildFocusCard(lot) {
  const ts   = tvGetTS(lot);
  const late = tvIsLate(lot);
  const danger = lot.priority === 'sameday' || late;
  const bs = danger ? 'background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)'
           : lot.priority === 'urgent' ? 'background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.3)'
           : 'background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)';
  const bt = danger ? 'Atencao' : lot.priority === 'urgent' ? 'Urgente' : 'Normal';
  return `
    <div class="tv-focus-card ${danger?'danger':''}">
      <div class="tv-focus-top">
        <div class="tv-focus-num">#${tvE(lot.number||'')}</div>
        <div class="tv-focus-badge" style="${bs}">${bt}</div>
      </div>
      <div class="tv-focus-client">${tvE(lot.client||'')}</div>
      <div class="tv-focus-paint">${tvE(lot.paint||lot.productCode||'')}</div>
      <div class="tv-focus-meta">
        <span class="tv-meta-chip mtime"><i class="fas fa-clock"></i> ${tvFmtMs(ts.total)}</span>
        <span class="tv-meta-chip mtype">${tvE(lot.qty||'')}${tvE(lot.unit||'Kg')}</span>
        <span class="tv-meta-chip mdate ${late?'mlate':tvIsToday(lot.deliveryDate)?'mtoday':''}">${tvFmtDate(lot.deliveryDate)}</span>
      </div>
    </div>`;
}

function tvBuildSectorCol(sector, lots) {
  const sl = lots.filter(l => tvNS(l.sector, l) === sector)
    .sort((a, b) => {
      const po = { sameday:0, urgent:1, normal:2 };
      const pd = (po[a.priority]??2) - (po[b.priority]??2);
      return pd !== 0 ? pd : tvTInSec(b) - tvTInSec(a);
    });
  const color = TV_SECTOR_COLORS[sector] || '#6b7280';
  const icon  = TV_SECTOR_ICONS[sector]  || 'fas fa-circle';
  const isRev = ['coloracao_revisao','laboratorio_revisao','pcp_liberacao'].includes(sector);
  const isSmp = ['laboratorio_amostras','coloracao_amostras'].includes(sector);
  const isTrack = TV_TRACKABLE.includes(sector);
  let foot = '';
  if (isTrack && sl.length > 0) {
    let sw=0,sp=0;
    sl.forEach(l => { const t=tvGetTS(l); sw+=t.worked; sp+=t.paused; });
    foot = `<div class="tv-col-footer"><span class="tw"><i class="fas fa-play-circle"></i> ${tvFmtMs(sw/sl.length)}/lote</span>${sp>0?`<span class="tp"><i class="fas fa-pause-circle"></i> ${tvFmtMs(sp/sl.length)}</span>`:''}</div>`;
  }
  return `
    <div class="tv-prod-col">
      <div class="tv-col-head">
        <div class="tv-col-title" style="color:${color}">
          <i class="${icon}"></i>${TV_SECTOR_LABELS[sector]||sector}
          ${isRev?'<span style="font-size:.5rem;background:rgba(255,255,255,.07);padding:.05rem .25rem;border-radius:4px;color:#64748b">REV</span>':''}
          ${isSmp?'<span style="font-size:.5rem;background:rgba(250,204,21,.1);padding:.05rem .25rem;border-radius:4px;color:#facc15">AMOSTRA</span>':''}
        </div>
        <div class="tv-col-count" style="color:${color}">${sl.length}</div>
      </div>
      <div class="tv-col-body">
        ${sl.length===0 ? `<div class="tv-empty-col"><i class="fas fa-inbox"></i><span>Vazio</span></div>` : sl.map(l=>tvBuildLotCard(l)).join('')}
      </div>
      ${foot}
    </div>`;
}

function tvRenderMetrics(lots, routes) {
  const ns = l => tvNS(l.sector, l);
  const terminal = ['entrega','entregue','finalizado'];

  const inProd  = lots.filter(l => !terminal.includes(ns(l))).length;
  const working = lots.filter(l => l.lotStatus==='working' && !terminal.includes(ns(l))).length;
  const paused  = lots.filter(l => l.lotStatus==='paused'  && !terminal.includes(ns(l))).length;
  const idle    = Math.max(0, inProd - working - paused);
  const ready   = lots.filter(l => ns(l)==='pronto').length;
  const inRoute = lots.filter(l => ns(l)==='entrega').length;
  const urgent  = lots.filter(l => ['urgent','sameday'].includes(l.priority) && !terminal.includes(ns(l))).length;
  const late    = lots.filter(l => tvIsLate(l)).length;

  const kpis = [
    ['Em Producao',  inProd,  'fas fa-cogs',               'k-blue'],
    ['Trabalhando',  working, 'fas fa-play-circle',         'k-green'],
    ['Pausados',     paused,  'fas fa-pause-circle',        'k-yellow'],
    ['Aguardando',   idle,    'fas fa-hourglass-half',      'k-slate'],
    ['Prontos',      ready,   'fas fa-check-circle',        'k-emerald'],
    ['Em Rota',      inRoute, 'fas fa-truck',               'k-orange'],
    ['Urgentes',     urgent,  'fas fa-bolt',                urgent>0?'k-red':'k-slate'],
    ['Atrasados',    late,    'fas fa-exclamation-triangle',late>0?'k-red':'k-slate']
  ];

  const kpiHtml = kpis.map(([lbl,val,icon,cls]) => `
    <div class="tv-kpi-card ${cls}">
      <div class="tv-kpi-icon"><i class="${icon}"></i></div>
      <div class="tv-kpi-value">${val}</div>
      <div class="tv-kpi-label">${lbl}</div>
    </div>`).join('');

  const sectHtml = TV_SECTORS.map(sec => {
    const st = tvSecStats(sec);
    const color = TV_SECTOR_COLORS[sec] || '#6b7280';
    const icon  = TV_SECTOR_ICONS[sec]  || 'fas fa-circle';
    const wPct  = st.total ? Math.round(st.working/st.total*100) : 0;
    const pPct  = st.total ? Math.round(st.paused /st.total*100) : 0;
    const badges = [
      st.working ? `<span class="tv-sec-badge sw"><i class="fas fa-play"></i> ${st.working}</span>` : '',
      st.paused  ? `<span class="tv-sec-badge sp"><i class="fas fa-pause"></i> ${st.paused}</span>` : '',
      st.urgent  ? `<span class="tv-sec-badge su"><i class="fas fa-bolt"></i> ${st.urgent} urg.</span>` : '',
      st.late    ? `<span class="tv-sec-badge sl"><i class="fas fa-exclamation"></i> ${st.late} atras.</span>` : ''
    ].filter(Boolean).join('');
    return `
      <div class="tv-sec-row">
        <div class="tv-sec-row-top">
          <div class="tv-sec-row-name" style="color:${color}"><i class="${icon}" style="flex-shrink:0"></i>${TV_SECTOR_LABELS[sec]||sec}</div>
          <div class="tv-sec-row-count" style="color:${color}">${st.total}</div>
        </div>
        ${st.total>0?`<div class="tv-sec-badges">${badges||'<span class="tv-sec-badge" style="color:#475569">Aguardando</span>'}</div>`:''}
        <div class="tv-sec-bar-track">
          <div class="tv-sbar-w" style="width:${wPct}%"></div>
          <div class="tv-sbar-p" style="width:${pPct}%"></div>
          <div class="tv-sbar-i"></div>
        </div>
      </div>`;
  }).join('');

  const alerts = tvGetAlerts().slice(0,8);
  const alertsHtml = alerts.length ? alerts.map(l => `
    <div class="tv-alert-item">
      <div class="tv-alert-num">#${tvE(l.number||'')}</div>
      <div class="tv-alert-info">
        <div class="tv-alert-client">${tvE(l.client||'')}</div>
        <div class="tv-alert-sector">${TV_SECTOR_LABELS[tvNS(l.sector,l)]||tvNS(l.sector,l)}</div>
      </div>
      <div class="tv-alert-time"><i class="fas fa-clock"></i> ${tvFmtMs(tvTInSec(l))}</div>
    </div>`).join('')
  : `<div class="tv-empty-state"><i class="fas fa-check-circle"></i>Sem alertas ativos</div>`;

  const upcoming = lots.filter(l => l.deliveryDate && ns(l)!=='entregue')
    .sort((a,b) => String(a.deliveryDate).localeCompare(String(b.deliveryDate)))
    .slice(0,10);

  const upHtml = upcoming.length ? upcoming.map(l => {
    const late  = tvIsLate(l), today = tvIsToday(l.deliveryDate);
    const cls   = late?'dl':today?'dt':'ds';
    const icon  = late?'&#9888;':today?'&#128197;':'&#128230;';
    return `
      <div class="tv-delivery-chip">
        <div>
          <div class="tv-deliv-order">#${tvE(l.number||'')}</div>
          <div class="tv-deliv-client">${tvE(l.client||'')}</div>
        </div>
        <div class="tv-deliv-date ${cls}">${icon} ${tvFmtDate(l.deliveryDate)}</div>
      </div>`;
  }).join('')
  : `<span class="tv-bchip muted">Nenhuma entrega proxima</span>`;

  return `
    <div class="tv-metrics-page">
      <div class="tv-kpi-bar">${kpiHtml}</div>
      <div class="tv-metrics-middle">
        <div class="tv-sectors-panel">
          <div class="tv-panel-header"><i class="fas fa-layer-group"></i> Ocupacao por Setor</div>
          <div class="tv-sectors-grid">${sectHtml}</div>
        </div>
        <div class="tv-alert-panel">
          <div class="tv-panel-header" style="border-color:rgba(239,68,68,.15)"><i class="fas fa-triangle-exclamation" style="color:#f87171"></i> Alertas &mdash; mais de 2h no setor</div>
          <div class="tv-alert-list">${alertsHtml}</div>
        </div>
      </div>
      <div class="tv-deliveries-bar">
        <div class="tv-panel-header" style="border-radius:16px 16px 0 0"><i class="fas fa-calendar-check"></i> Proximas Entregas</div>
        <div class="tv-deliveries-list">${upHtml}</div>
      </div>
    </div>`;
}

function tvRenderProduction(lots, routes) {
  const main = ['pcp_liberacao','pesagem','producao','coloracao','laboratorio','envase_produzir'];
  const ns   = l => tvNS(l.sector, l);

  const prio = [...lots].filter(l => !['entrega','entregue'].includes(ns(l)))
    .sort((a,b) => {
      const s = x => (x.priority==='sameday'?100000:x.priority==='urgent'?60000:0) + tvTInSec(x);
      return s(b) - s(a);
    }).slice(0,5);

  const readyLots = lots.filter(l => ns(l)==='pronto');

  const prioHtml = prio.length ? prio.map(l=>tvBuildFocusCard(l)).join('')
    : `<div class="tv-empty-col"><i class="fas fa-check-circle"></i><span>Sem prioridade critica</span></div>`;

  const readyHtml = readyLots.length ? readyLots.slice(0,8).map(l => {
    const ir = tvInRoute(l, routes);
    return `
      <div class="tv-ready-item ${ir?'in-route':''}">
        <div class="tv-ready-num">#${tvE(l.number||'')}</div>
        <div><div class="tv-ready-client">${tvE(l.client||'')}</div><div class="tv-ready-paint">${tvE(l.paint||l.productCode||'')}</div></div>
        <div class="tv-ready-badge ${ir?'route':'ready'}">${ir?'Em rota':'Pronto'}</div>
      </div>`;
  }).join('')
  : `<div class="tv-empty-col"><i class="fas fa-box-open"></i><span>Nenhum pronto</span></div>`;

  return `
    <div class="tv-production-page">
      ${main.map(s=>tvBuildSectorCol(s,lots)).join('')}
      <div class="tv-side-col">
        <div class="tv-side-card">
          <div class="tv-col-head">
            <div class="tv-col-title" style="color:#fb923c"><i class="fas fa-bolt"></i> Prioridades</div>
            <div class="tv-col-count" style="color:#fb923c">${prio.length}</div>
          </div>
          <div class="tv-col-body">${prioHtml}</div>
        </div>
        <div class="tv-side-card">
          <div class="tv-col-head">
            <div class="tv-col-title" style="color:#4ade80"><i class="fas fa-clipboard-check"></i> Prontos</div>
            <div class="tv-col-count" style="color:#4ade80">${readyLots.length}</div>
          </div>
          <div class="tv-ready-list">${readyHtml}</div>
        </div>
      </div>
    </div>`;
}

function tvRenderKanban(lots, kanbanIdx) {
  const slice = TV_SECTORS.slice(kanbanIdx * TV_COLS_PER_PAGE, (kanbanIdx+1) * TV_COLS_PER_PAGE);
  return `
    <div class="tv-kanban-page" style="grid-template-columns:repeat(${slice.length},minmax(0,1fr))">
      ${slice.map(s=>tvBuildSectorCol(s,lots)).join('')}
    </div>`;
}

function tvRenderExpedition(lots, routes) {
  const ns = l => tvNS(l.sector, l);
  const urg = lots.filter(l => {
    const s = ns(l);
    return s!=='pronto'&&s!=='entregue'&&(l.priority==='urgent'||l.priority==='sameday'||tvIsLate(l));
  });
  const groups = tvGroupByOrder(urg).slice(0,10);
  const ready  = lots.filter(l => ns(l)==='pronto');
  const rids   = new Set();
  routes.forEach(r => r.status==='in_progress' && (r.lots||[]).forEach(x => rids.add(String(x.lotId||x.id||x.number||''))));

  const urgHtml = groups.length ? groups.map(g => `
    <div class="tv-urgent-card">
      <div class="tv-urgent-top">
        <div class="tv-urgent-order"><i class="fas fa-clipboard-list"></i> Pedido ${tvE(g.order||'-')}</div>
        <div class="tv-urgent-badge">Urgente</div>
      </div>
      <div class="tv-urgent-client">${tvE(g.client||'')}</div>
      <div class="tv-urgent-lots">
        ${g.lots.slice(0,4).map(l=>`
          <div class="tv-urgent-lot">
            <strong>#${tvE(l.number||'')}</strong>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tvE(l.paint||l.productCode||'')}</span>
            <em>${tvE(TV_SECTOR_LABELS[ns(l)]||'-')}</em>
          </div>`).join('')}
      </div>
    </div>`).join('')
  : `<div class="tv-empty-state"><i class="fas fa-check-circle"></i>Nenhum pedido urgente</div>`;

  const rgHtml = ready.slice(0,48).map(l => {
    const ir = rids.has(String(l.id||l.number||''));
    return `
      <div class="tv-rgc ${ir?'route':''}">
        <div class="tv-rgc-num">#${tvE(l.number||'')}</div>
        <div><div class="tv-rgc-client">${tvE(l.client||'')}</div><div class="tv-rgc-paint">${tvE(l.paint||l.productCode||'')}</div></div>
        <div class="tv-rgc-status ${ir?'route':'ready'}">${ir?'Rota':'Pronto'}</div>
      </div>`;
  }).join('') || `<div class="tv-empty-state" style="grid-column:1/-1"><i class="fas fa-box-open"></i>Nenhum pronto</div>`;

  return `
    <div class="tv-expedition-page">
      <div class="tv-exp-panel">
        <div class="tv-exp-head">
          <div class="tv-exp-title" style="color:#f87171"><i class="fas fa-bolt"></i> Urgentes e Atrasados</div>
          <div class="tv-exp-count urgent">${groups.length}</div>
        </div>
        <div class="tv-exp-body">${urgHtml}</div>
      </div>
      <div class="tv-exp-panel">
        <div class="tv-exp-head">
          <div class="tv-exp-title" style="color:#4ade80"><i class="fas fa-check-circle"></i> Lotes Prontos</div>
          <div class="tv-exp-count readyc">${ready.length}</div>
        </div>
        <div class="tv-exp-body"><div class="tv-ready-grid">${rgHtml}</div></div>
      </div>
    </div>`;
}

function tvRenderOrders(lots, routes) {
  const ns = l => tvNS(l.sector, l);
  function buildCard(order, cls, statusText) {
    const lo = order.lots || [];
    const qty = lo.reduce((s,l)=>s+(Number(l.qty)||0),0);
    return `
      <div class="tv-order-card ${cls}">
        <div class="tv-order-top">
          <div class="tv-order-num"><i class="fas fa-clipboard-list"></i> Pedido ${tvE(order.order||'-')}</div>
          <div class="tv-order-badge ${cls}">${statusText}</div>
        </div>
        <div class="tv-order-client">${tvE(order.client||'')}</div>
        <div class="tv-order-meta">
          <span><i class="fas fa-boxes-stacked"></i> ${lo.length} lote(s)</span>
          <span><i class="fas fa-weight-hanging"></i> ${qty} Kg</span>
          ${order.deliveryDate?`<span><i class="fas fa-calendar"></i> ${tvFmtDate(order.deliveryDate)}</span>`:''}
          ${order.city?`<span><i class="fas fa-location-dot"></i> ${tvE(order.city)}</span>`:''}
        </div>
        <div class="tv-order-lots">
          ${lo.slice(0,3).map(l=>`
            <div class="tv-order-lot">
              <strong>#${tvE(l.number||'')}</strong>
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tvE(l.paint||l.productCode||'')}</span>
              <em>${tvE(TV_SECTOR_LABELS[ns(l)]||'-')}</em>
            </div>`).join('')}
          ${lo.length>3?`<div class="tv-order-more">+${lo.length-3} lote(s)</div>`:''}
        </div>
      </div>`;
  }
  function panel(pLots, cls, stText, ei, em) {
    const orders = tvGroupByOrder(pLots).slice(0,8);
    return `
      <div class="tv-orders-panel ${cls}">
        <div class="tv-orders-head">
          <div class="tv-orders-title ${cls}">
            ${cls==='new'?'<i class="fas fa-inbox"></i>':cls==='route'?'<i class="fas fa-truck-fast"></i>':'<i class="fas fa-box-circle-check"></i>'}
            ${cls==='new'?'Pedidos Novos / Revisao':cls==='route'?'Em Rota':'Entregues'}
          </div>
          <div class="tv-orders-count ${cls}">${orders.length}</div>
        </div>
        <div class="tv-orders-list">
          ${orders.length ? orders.map(o=>buildCard(o,cls,stText)).join('')
            : `<div class="tv-order-empty"><i class="${ei}"></i><span>${em}</span></div>`}
        </div>
      </div>`;
  }
  const newLots  = lots.filter(l=>['pcp_liberacao','coloracao_revisao','laboratorio_revisao'].includes(ns(l)));
  const routeLots= lots.filter(l=>ns(l)==='entrega'||tvInRoute(l,routes));
  const delLots  = lots.filter(l=>ns(l)==='entregue');
  return `
    <div class="tv-orders-page">
      ${panel(newLots,   'new',       'Novo',     'fas fa-circle-check','Nenhum pedido aguardando')}
      ${panel(routeLots, 'route',     'Em rota',  'fas fa-truck',       'Nenhum pedido em rota')}
      ${panel(delLots,   'delivered', 'Entregue', 'fas fa-box-open',    'Nenhum entregue ainda')}
    </div>`;
}

function tvRenderRoutes(routes) {
  const active = routes.filter(r=>r.status==='in_progress');
  if (!active.length) {
    return `
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">
        <div class="tv-route-empty">
          <i class="fas fa-truck"></i>
          <div>Nenhuma rota em andamento</div>
          <div style="font-size:.78rem;opacity:.6">As rotas ativas aparecerao aqui automaticamente</div>
        </div>
      </div>`;
  }
  const route = active[tvRoutePageIdx % active.length];
  const rl    = Array.isArray(route.lots) ? route.lots : [];
  const del   = rl.filter(l=>l.delivered||l.status==='delivered'||l.status==='entregue').length;
  const pend  = Math.max(0, rl.length-del);
  const pct   = rl.length ? Math.round(del/rl.length*100) : 0;
  const kg    = rl.reduce((s,l)=>s+(Number(l.qty)||0),0);
  const next  = rl.find(l=>!(l.delivered||l.status==='delivered'||l.status==='entregue')) || rl[0];

  return `
    <div class="tv-routes-page">
      <div class="tv-route-panel">
        <div class="tv-route-driver-icon"><i class="fas fa-truck"></i></div>
        <div class="tv-route-driver-name">${tvE(route.driverName||'Motorista')}</div>
        <div class="tv-route-driver-sub">Central logistica ao vivo</div>
        <div class="tv-live-badge"><div class="tv-live-dot"></div> EM ROTA</div>
        <div class="tv-route-progress-track">
          <div class="tv-route-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="tv-route-pct">${del}/${rl.length} entregas &middot; ${pct}%${active.length>1?` &middot; Rota ${tvRoutePageIdx%active.length+1}/${active.length}`:''}</div>
        <div class="tv-route-stats">
          <div class="tv-route-stat"><strong>${rl.length}</strong><span>Paradas</span></div>
          <div class="tv-route-stat"><strong>${pend}</strong><span>Pendentes</span></div>
          <div class="tv-route-stat"><strong>${del}</strong><span>Entregues</span></div>
          <div class="tv-route-stat"><strong>${kg||'&ndash;'}</strong><span>Kg totais</span></div>
        </div>
      </div>

      <div class="tv-stops-panel">
        <div class="tv-col-head">
          <div class="tv-col-title" style="color:#60a5fa"><i class="fas fa-route"></i> Roteiro de Entregas</div>
          <div class="tv-col-count" style="color:#60a5fa">${rl.length}</div>
        </div>
        <div class="tv-stops-list">
          ${rl.slice(0,6).map((lot,idx)=>`
            <div class="tv-stop-card ${idx===0?'next':''}">
              <div class="tv-stop-num">${idx+1}</div>
              <div>
                ${idx===0?'<div class="tv-stop-next-b">PROXIMA</div>':''}
                <div class="tv-stop-client">${tvE(lot.client||'Cliente')}</div>
                <div class="tv-stop-product">${tvE(lot.paint||lot.productCode||lot.number||'Produto')}</div>
              </div>
              <div class="tv-stop-meta">
                <div class="tv-stop-num-t">#${tvE(lot.number||'')}</div>
                <div class="tv-stop-qty">${tvE(lot.qty||'')} Kg</div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <div class="tv-route-kpi-panel">
        ${next?`
          <div class="tv-route-next-box">
            <div class="tv-rn-label"><i class="fas fa-location-dot"></i> Proxima entrega</div>
            <div class="tv-rn-client">${tvE(next.client||'&ndash;')}</div>
            <div class="tv-rn-product">${tvE(next.paint||next.productCode||'')}</div>
          </div>`:''}
        <div class="tv-rk-row"><span class="tv-rk-label">Status</span><span class="tv-rk-value" style="color:#4ade80">Ao vivo</span></div>
        <div class="tv-rk-row"><span class="tv-rk-label">Motorista</span><span class="tv-rk-value">${tvE(route.driverName||'&ndash;')}</span></div>
        <div class="tv-rk-row"><span class="tv-rk-label">Progresso</span><span class="tv-rk-value" style="color:#60a5fa">${pct}%</span></div>
        <div class="tv-rk-row"><span class="tv-rk-label">Pendentes</span><span class="tv-rk-value" style="color:${pend>0?'#fb923c':'#4ade80'}">${pend}</span></div>
      </div>
    </div>`;
}

// ============================================================
// MAIN RENDER
// ============================================================
function tvPageDef() {
  const kb = Math.max(1, Math.ceil(TV_SECTORS.length / TV_COLS_PER_PAGE));
  return { total: 2 + kb + 3, kb };
}

function tvRender() {
  const lots   = tvState.lots.map(tvNormLot);
  const routes = tvState.routes;
  const { total, kb } = tvPageDef();

  tvCurrentPage = tvCurrentPage % total;

  const isMetrics = tvCurrentPage === 0;
  const isProd    = tvCurrentPage === 1;
  const isKanban  = tvCurrentPage >= 2 && tvCurrentPage < 2 + kb;
  const isExp     = tvCurrentPage === 2 + kb;
  const isOrders  = tvCurrentPage === 3 + kb;
  const isRoutes  = tvCurrentPage === 4 + kb;

  // Page tabs
  const tabLabels = ['Visao Geral','Producao',...Array.from({length:kb},(_,i)=>`Kanban ${i+1}`),'Expedicao','Pedidos','Rotas'];
  const tabsEl = document.getElementById('tvPageTabs');
  if (tabsEl) tabsEl.innerHTML = tabLabels.map((lbl,i)=>`<div class="tv-page-tab ${i===tvCurrentPage?'active':''}">${lbl}</div>`).join('');

  // Bottom bar visibility
  const bot = document.getElementById('tvBottomBar');
  if (bot) bot.style.display = (isMetrics||isExp||isOrders||isRoutes) ? 'none' : 'flex';

  // Render
  const el = document.getElementById('tvContent');
  if (!el) return;

  if      (isMetrics) el.innerHTML = tvRenderMetrics(lots, routes);
  else if (isProd)    el.innerHTML = tvRenderProduction(lots, routes);
  else if (isKanban)  el.innerHTML = tvRenderKanban(lots, tvCurrentPage - 2);
  else if (isExp)     el.innerHTML = tvRenderExpedition(lots, routes);
  else if (isOrders)  el.innerHTML = tvRenderOrders(lots, routes);
  else if (isRoutes)  el.innerHTML = tvRenderRoutes(routes);

  // Bottom bar chips
  if (bot && bot.style.display !== 'none') {
    const activeR = routes.filter(r=>r.status==='in_progress');
    const rEl = document.getElementById('tvRouteChips');
    if (rEl) rEl.innerHTML = activeR.length
      ? activeR.map(r=>`<div class="tv-bchip route"><i class="fas fa-truck"></i> ${tvE(r.driverName||'Motorista')} &mdash; ${(r.lots||[]).length} paradas</div>`).join('')
      : '<span class="tv-bchip muted">Nenhuma</span>';

    const ready = lots.filter(l=>tvNS(l.sector,l)==='pronto');
    const rdEl  = document.getElementById('tvReadyChips');
    if (rdEl) rdEl.innerHTML = ready.length
      ? ready.slice(0,6).map(l=>`<div class="tv-bchip ready">#${tvE(l.number)} ${tvE(String(l.client||'').slice(0,10))}</div>`).join('')
      : '<span class="tv-bchip muted">Nenhum</span>';

    const alts = tvGetAlerts();
    const alEl = document.getElementById('tvAlertChips');
    if (alEl) alEl.innerHTML = alts.length
      ? alts.slice(0,5).map(l=>`<div class="tv-bchip alert"><i class="fas fa-clock"></i> #${tvE(l.number)} ${tvFmtMs(tvTInSec(l))}</div>`).join('')
      : '<span class="tv-bchip muted">Nenhum</span>';
  }

  const upEl = document.getElementById('tvLastUpdate');
  if (upEl) upEl.textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
}

// ============================================================
// AUTH
// ============================================================
function tvFnv1a32(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h.toString(16).padStart(8,'0');
}

function tvVerifyPwd(entered, stored) {
  if (!stored) return false;
  if (stored.includes(':')) {
    const [salt] = stored.split(':');
    let h = tvFnv1a32(salt + entered);
    for (let r=0;r<3;r++) h = tvFnv1a32(salt + h + entered);
    return `${salt}:${h}` === stored;
  }
  return entered === stored;
}

async function tvHandleLogin(e) {
  e.preventDefault();
  const login = document.getElementById('tvUser').value.trim();
  const pass  = document.getElementById('tvPass').value;
  try {
    const users = await tvApiGet('ff_users');
    const user  = users.find(u => u.login===login && tvVerifyPwd(pass, u.password));
    if (!user || !['admin','diretoria','pcp','pcp_lib','manager','tv'].includes(user.role)) {
      document.getElementById('tvAuthError').style.display = 'block';
      return;
    }
    document.getElementById('tvAuthError').style.display = 'none';
    tvState.currentUser = user;
    sessionStorage.setItem('ff_tv', JSON.stringify(user));
    await tvInit();
  } catch(err) { alert('Erro ao conectar: ' + err.message); }
}

// ============================================================
// INIT
// ============================================================
async function tvInit() {
  document.getElementById('tvAuthScreen').style.display = 'none';
  document.getElementById('tvLoading').style.display = 'flex';
  try {
    await tvLoadData();
    document.getElementById('tvLoading').style.display = 'none';
    document.getElementById('tvPanel').style.display = 'flex';
    tvRender();

    if (tvUpdateInterval) clearInterval(tvUpdateInterval);
    tvUpdateInterval = setInterval(async () => {
      try { await tvLoadData(); tvRender(); } catch(e){}
    }, 5000);

    if (tvAutoInterval) clearInterval(tvAutoInterval);
    tvAutoInterval = setInterval(() => {
      const { total, kb } = tvPageDef();
      if (tvCurrentPage === 4+kb) tvRoutePageIdx++;
      tvCurrentPage = (tvCurrentPage + 1) % total;
      tvRender();
    }, 12000);

  } catch(err) {
    document.getElementById('tvLoading').innerHTML = `
      <div class="tv-loading-icon"><i class="fas fa-exclamation-triangle" style="color:#ef4444"></i></div>
      <h2 style="color:#ef4444">Erro de Conexao</h2>
      <p>${tvE(err.message)}</p>
      <a href="index.html" style="color:#3b82f6;font-size:.85rem">&#8592; Voltar</a>`;
  }
}

async function tvCheckAuth() {
  try {
    const raw = sessionStorage.getItem('ff_tv') || sessionStorage.getItem('ff_user');
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    if (!['admin','diretoria','pcp','pcp_lib','manager','tv'].includes(parsed.role)) return false;
    tvState.currentUser = parsed;
    return true;
  } catch(e) { return false; }
}

(async () => {
  updateClock();
  setInterval(updateClock, 1000);
  const authed = await tvCheckAuth();
  if (authed) { await tvInit(); }
  else {
    document.getElementById('tvLoading').style.display = 'none';
    document.getElementById('tvAuthScreen').style.display = 'flex';
  }
})();
</script>
