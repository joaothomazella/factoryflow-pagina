<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FactoryFlow – Modo TV Atualizado</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #020818;
      --bg2:     #071028;
      --surface: #0d1f3c;
      --border:  #1a3a6e;
      --text:    #e2f0ff;
      --text2:   #7eb8f7;
      --blue:    #3b82f6;
      --green:   #22c55e;
      --yellow:  #f59e0b;
      --red:     #ef4444;
      --orange:  #f97316;
      --purple:  #8b5cf6;
      --cyan:    #06b6d4;
      --fuchsia: #e879f9;
      --teal:    #2dd4bf;
      --rose:    #f43f5e;
      --glow:    rgba(59,130,246,0.3);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .tv-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 80%, rgba(6,182,212,0.05) 0%, transparent 60%);
    }
    .tv-grid-lines {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridScroll 20s linear infinite;
    }
    @keyframes gridScroll {
      from { transform: translateY(0); }
      to   { transform: translateY(60px); }
    }

    /* ===== LAYOUT ===== */
    .tv-wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh;
    }

    /* ===== TOP BAR ===== */
    .tv-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: .5rem 1.2rem;
      background: rgba(7,16,40,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .tv-brand { display: flex; align-items: center; gap: .6rem; }
    .tv-brand-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 16px var(--glow);
    }
    .tv-brand h1 {
      font-size: 1.1rem; font-weight: 800;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .tv-brand p { font-size: .62rem; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; }
    .tv-topbar-center { display: flex; align-items: center; gap: 1.5rem; }
    .tv-clock {
      font-size: 1.6rem; font-weight: 700; color: var(--text);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(59,130,246,0.5);
    }
    .tv-date { font-size: .72rem; color: var(--text2); text-align: center; }
    .tv-topbar-right { display: flex; align-items: center; gap: 1rem; }
    .tv-live-badge {
      display: flex; align-items: center; gap: .4rem;
      background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.4);
      border-radius: 20px; padding: .25rem .7rem;
      font-size: .7rem; color: var(--green); font-weight: 600;
    }
    .tv-live-dot {
      width: 7px; height: 7px; background: var(--green); border-radius: 50%;
      animation: livePulse 1.5s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(34,197,94,.7); }
      50%      { opacity:.7; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }

    /* ===== METRICS BAR ===== */
    .tv-metrics-bar { display: flex; gap: .5rem; flex-wrap: wrap; }
    .tv-metric-chip {
      display: flex; align-items: center; gap: .35rem;
      padding: .25rem .6rem; border-radius: 7px;
      font-size: .72rem; font-weight: 600; border: 1px solid transparent;
    }
    .tv-metric-chip.blue   { background:rgba(59,130,246,.15); border-color:rgba(59,130,246,.3); color:#60a5fa; }
    .tv-metric-chip.green  { background:rgba(34,197,94,.15);  border-color:rgba(34,197,94,.3);  color:#4ade80; }
    .tv-metric-chip.yellow { background:rgba(245,158,11,.15); border-color:rgba(245,158,11,.3); color:#fbbf24; }
    .tv-metric-chip.red    { background:rgba(239,68,68,.15);  border-color:rgba(239,68,68,.3);  color:#f87171; }
    .tv-metric-chip.orange { background:rgba(249,115,22,.15); border-color:rgba(249,115,22,.3); color:#fb923c; }
    .tv-metric-chip.purple { background:rgba(139,92,246,.15); border-color:rgba(139,92,246,.3); color:#a78bfa; }
    .tv-metric-chip i { font-size: .65rem; }

    /* ===== SECTOR COLUMNS ===== */
    .tv-columns-wrapper {
      display: flex; flex: 1; gap: 0;
      overflow: hidden; min-height: 0;
    }
    .tv-column {
      flex: 1 1 0; display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden; position: relative;
      min-width: 0;
    }
    .tv-column:last-child { border-right: none; }

    .tv-col-header {
      padding: .5rem .6rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; position: relative;
    }
    .tv-col-header::after {
      content: ''; position: absolute; bottom:0; left:0; right:0; height: 2px;
    }
    .tv-col-title {
      display: flex; align-items: center; gap: .4rem;
      font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      min-width: 0;
    }
    .tv-col-icon {
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: .62rem; flex-shrink: 0;
    }
    .tv-col-count {
      font-size: 1rem; font-weight: 800;
      padding: .1rem .4rem; border-radius: 5px;
      min-width: 26px; text-align: center; flex-shrink: 0;
    }
    .tv-col-body {
      flex: 1; overflow-y: auto; padding: .4rem;
      display: flex; flex-direction: column; gap: .35rem;
    }
    .tv-col-body::-webkit-scrollbar { width: 2px; }
    .tv-col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ===== LOT CARDS ===== */
    .tv-lot-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: .5rem .6rem;
      position: relative; overflow: hidden;
      transition: transform .3s ease, box-shadow .3s ease;
      animation: cardSlideIn .4s ease;
    }
    @keyframes cardSlideIn {
      from { opacity:0; transform: translateY(-8px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .tv-lot-card::before {
      content: ''; position: absolute; top:0; left:0; right:0; height: 2px;
    }
    .tv-lot-card.priority-urgent { border-color: rgba(245,158,11,.5); }
    .tv-lot-card.priority-urgent::before { background: var(--yellow); }
    .tv-lot-card.priority-sameday {
      border-color: rgba(239,68,68,.5);
      animation: cardSlideIn .4s ease, redPulse 2s ease-in-out infinite;
    }
    .tv-lot-card.priority-sameday::before { background: var(--red); }
    @keyframes redPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
      50%      { box-shadow: 0 0 0 4px rgba(239,68,68,0.2); }
    }
    .tv-lot-card.priority-normal::before { background: var(--green); }
    .tv-lot-card.late-lot { border-color: rgba(239,68,68,.6); background: rgba(239,68,68,.04); }

    .tv-card-row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:.25rem; }
    .tv-lot-number { font-size: .8rem; font-weight: 800; color: var(--text); letter-spacing: .4px; }
    .tv-priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tv-lot-client { font-size: .68rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .15rem; }
    .tv-lot-paint  { font-size: .64rem; color: #94a3b8; margin-bottom: .2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .tv-card-row2 { display:flex; align-items:center; justify-content:space-between; margin-top:.25rem; flex-wrap: wrap; gap: .2rem; }
    .tv-product-type {
      font-size: .58rem; padding: .08rem .35rem; border-radius: 3px;
      font-weight: 600; text-transform: uppercase; letter-spacing: .4px;
    }
    .tv-time-chip { font-size: .6rem; color: #64748b; display:flex; align-items:center; gap:.15rem; }
    .tv-time-chip.alert-time { color: var(--red); animation: blink .8s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .tv-delivery-date { font-size: .58rem; color: #64748b; }
    .tv-delivery-date.today { color: var(--yellow); font-weight: 600; }
    .tv-delivery-date.late  { color: var(--red); font-weight: 700; }

    /* TIME BAR for TV */
    .tv-time-bar-wrap { margin-top: .3rem; }
    .tv-time-bar {
      height: 3px; background: rgba(255,255,255,0.06);
      border-radius: 2px; display: flex; overflow: hidden;
    }
    .tv-tbar-worked { height: 100%; background: var(--green); transition: width .5s; }
    .tv-tbar-paused { height: 100%; background: var(--yellow); transition: width .5s; }
    .tv-tbar-idle   { height: 100%; background: rgba(100,116,139,0.3); flex: 1; }
    .tv-tbar-labels { display:flex; gap:.4rem; margin-top:.15rem; font-size:.56rem; color:#4a6080; }
    .tv-tbar-labels .tw  { color: rgba(34,197,94,.8); }
    .tv-tbar-labels .tp  { color: rgba(245,158,11,.8); }

    /* Status dot */
    .tv-status-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: .2rem;
    }
    .tv-status-dot.working { background: var(--green); animation: livePulse 1.2s infinite; }
    .tv-status-dot.paused  { background: var(--yellow); }

    .tv-empty-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #334155; font-size: .7rem; gap: .4rem;
    }
    .tv-empty-col i { font-size: 1.2rem; opacity: .25; }

    /* ===== COLUMN THEME COLORS ===== */
    /* Review/Lib sectors */
    .col-coloracao_revisao .tv-col-header   { background: rgba(232,121,249,.07); }
    .col-coloracao_revisao .tv-col-header::after { background: #e879f9; }
    .col-coloracao_revisao .tv-col-icon     { background: rgba(232,121,249,.2); color: #f0abfc; }
    .col-coloracao_revisao .tv-col-count    { background: rgba(232,121,249,.2); color: #f0abfc; }

    .col-laboratorio_revisao .tv-col-header { background: rgba(45,212,191,.07); }
    .col-laboratorio_revisao .tv-col-header::after { background: #2dd4bf; }
    .col-laboratorio_revisao .tv-col-icon   { background: rgba(45,212,191,.2); color: #5eead4; }
    .col-laboratorio_revisao .tv-col-count  { background: rgba(45,212,191,.2); color: #5eead4; }

    .col-pcp_liberacao .tv-col-header       { background: rgba(244,63,94,.07); }
    .col-pcp_liberacao .tv-col-header::after { background: #f43f5e; }
    .col-pcp_liberacao .tv-col-icon         { background: rgba(244,63,94,.2); color: #fb7185; }
    .col-pcp_liberacao .tv-col-count        { background: rgba(244,63,94,.2); color: #fb7185; }

    /* Production sectors */
    .col-pesagem .tv-col-header     { background: rgba(59,130,246,.07); }
    .col-pesagem .tv-col-header::after { background: #3b82f6; }
    .col-pesagem .tv-col-icon       { background: rgba(59,130,246,.2); color: #60a5fa; }
    .col-pesagem .tv-col-count      { background: rgba(59,130,246,.2); color: #60a5fa; }

    .col-producao .tv-col-header    { background: rgba(139,92,246,.07); }
    .col-producao .tv-col-header::after { background: #8b5cf6; }
    .col-producao .tv-col-icon      { background: rgba(139,92,246,.2); color: #a78bfa; }
    .col-producao .tv-col-count     { background: rgba(139,92,246,.2); color: #a78bfa; }

    .col-coloracao .tv-col-header   { background: rgba(245,158,11,.07); }
    .col-coloracao .tv-col-header::after { background: #f59e0b; }
    .col-coloracao .tv-col-icon     { background: rgba(245,158,11,.2); color: #fbbf24; }
    .col-coloracao .tv-col-count    { background: rgba(245,158,11,.2); color: #fbbf24; }

    .col-laboratorio .tv-col-header { background: rgba(16,185,129,.07); }
    .col-laboratorio .tv-col-header::after { background: #10b981; }
    .col-laboratorio .tv-col-icon   { background: rgba(16,185,129,.2); color: #34d399; }
    .col-laboratorio .tv-col-count  { background: rgba(16,185,129,.2); color: #34d399; }

    .col-laboratorio_amostras .tv-col-header { background: rgba(20,184,166,.07); }
    .col-laboratorio_amostras .tv-col-header::after { background: #14b8a6; }
    .col-laboratorio_amostras .tv-col-icon   { background: rgba(20,184,166,.2); color: #5eead4; }
    .col-laboratorio_amostras .tv-col-count  { background: rgba(20,184,166,.2); color: #5eead4; }

    .col-coloracao_amostras .tv-col-header   { background: rgba(250,204,21,.07); }
    .col-coloracao_amostras .tv-col-header::after { background: #facc15; }
    .col-coloracao_amostras .tv-col-icon     { background: rgba(250,204,21,.2); color: #fde047; }
    .col-coloracao_amostras .tv-col-count    { background: rgba(250,204,21,.2); color: #fde047; }

    .col-envase_produzir .tv-col-header      { background: rgba(249,115,22,.07); }
    .col-envase_produzir .tv-col-header::after { background: #f97316; }
    .col-envase_produzir .tv-col-icon        { background: rgba(249,115,22,.2); color: #fb923c; }
    .col-envase_produzir .tv-col-count       { background: rgba(249,115,22,.2); color: #fb923c; }

    .col-envase_enlatamento .tv-col-header      { background: rgba(6,182,212,.07); }
    .col-envase_enlatamento .tv-col-header::after { background: #06b6d4; }
    .col-envase_enlatamento .tv-col-icon        { background: rgba(6,182,212,.2); color: #22d3ee; }
    .col-envase_enlatamento .tv-col-count       { background: rgba(6,182,212,.2); color: #22d3ee; }

    .col-pronto .tv-col-header      { background: rgba(34,197,94,.07); }
    .col-pronto .tv-col-header::after { background: #22c55e; }
    .col-pronto .tv-col-icon        { background: rgba(34,197,94,.2); color: #4ade80; }
    .col-pronto .tv-col-count       { background: rgba(34,197,94,.2); color: #4ade80; }

    /* Product type badges */
    .type-tinta       { background:rgba(59,130,246,.2);  color:#60a5fa; }
    .type-diluente    { background:rgba(6,182,212,.2);   color:#22d3ee; }
    .type-endurecedor { background:rgba(139,92,246,.2);  color:#a78bfa; }
    .type-base        { background:rgba(245,158,11,.2);  color:#fbbf24; }
    .type-amostra     { background:rgba(232,121,249,.2); color:#f0abfc; }

    /* Urgency tags */
    .tv-urgent-marker {
      position: absolute; top: .35rem; right: .35rem;
      font-size: .52rem; padding: .08rem .3rem; border-radius: 3px;
      font-weight: 800; text-transform: uppercase;
    }
    .urgent-tag  { background:rgba(245,158,11,.25); color:#fbbf24; border:1px solid rgba(245,158,11,.4); }
    .sameday-tag { background:rgba(239,68,68,.25);  color:#f87171; border:1px solid rgba(239,68,68,.5); }

    /* ===== SECTOR STATS ROW ===== */
    .tv-sector-stats {
      padding: .3rem .6rem;
      display: flex; gap: .4rem;
      border-top: 1px solid rgba(255,255,255,.04);
      flex-shrink: 0;
      font-size: .58rem; color: #4a6080;
    }
    .tv-sector-stats span { display: flex; align-items: center; gap: .2rem; }
    .tv-sector-stats .sw { color: rgba(34,197,94,.7); }
    .tv-sector-stats .sp { color: rgba(245,158,11,.7); }
    .tv-sector-stats .si { color: rgba(100,116,139,.7); }

    /* ===== BOTTOM BAR ===== */
    .tv-bottombar {
      background: rgba(7,16,40,0.97); border-top: 1px solid var(--border);
      padding: .4rem 1.2rem;
      display: flex; align-items: center; gap: 1.5rem; flex-shrink: 0;
    }
    .tv-bottom-section { display:flex; align-items:center; gap:.5rem; flex:1; min-width: 0; }
    .tv-bottom-label {
      font-size: .6rem; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text2); font-weight: 600; white-space: nowrap;
    }
    .tv-chips { display:flex; gap:.3rem; flex-wrap:wrap; }
    .tv-delivery-chip {
      background:rgba(249,115,22,.15); border:1px solid rgba(249,115,22,.3);
      border-radius:5px; padding:.15rem .5rem; font-size:.65rem; color:#fb923c; white-space:nowrap;
    }
    .tv-ready-chip {
      background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.3);
      border-radius:5px; padding:.15rem .5rem; font-size:.65rem; color:#4ade80; white-space:nowrap;
    }
    .tv-alert-chip {
      background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3);
      border-radius:5px; padding:.15rem .5rem; font-size:.65rem; color:#f87171;
      display:flex; align-items:center; gap:.25rem; white-space:nowrap;
      animation: alertPulse 2s ease-in-out infinite;
    }
    @keyframes alertPulse {
      0%,100% { border-color:rgba(239,68,68,.3); }
      50%      { border-color:rgba(239,68,68,.8); }
    }

    /* ===== PAGE INDICATOR (auto-scroll) ===== */
    .tv-page-indicator { display:flex; align-items:center; gap:.35rem; }
    .tv-page-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--border); transition: all .3s;
    }
    .tv-page-dot.active {
      background: var(--blue); box-shadow: 0 0 6px var(--blue);
      width: 14px; border-radius: 3px;
    }

    /* ===== LOADING ===== */
    .tv-loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; gap: 1.2rem;
    }
    .tv-loading-logo {
      font-size: 3.5rem;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tv-loading h2 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tv-loading-bar {
      width: 180px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .tv-loading-fill {
      height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple));
      border-radius: 2px; animation: loadFill 1.5s ease-in-out infinite;
    }
    @keyframes loadFill {
      0%   { width:0; margin-left:0; }
      50%  { width:60%; margin-left:20%; }
      100% { width:0; margin-left:100%; }
    }

    /* ===== AUTH SCREEN ===== */
    .tv-auth-screen {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; gap:1.2rem;
    }
    .tv-auth-screen i { font-size:2.5rem; color:var(--blue); }
    .tv-auth-screen h2 { font-size:1.4rem; color:var(--text); }
    .tv-auth-screen p  { color:var(--text2); font-size:.85rem; }
    .tv-auth-form { display:flex; flex-direction:column; gap:.65rem; width:280px; }
    .tv-auth-form input {
      background:var(--surface); border:1px solid var(--border);
      border-radius:7px; padding:.65rem .9rem; color:var(--text); font-size:.9rem; outline:none;
    }
    .tv-auth-form input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(59,130,246,.2); }
    .tv-auth-btn {
      background:linear-gradient(135deg,var(--blue),var(--purple)); border:none;
      border-radius:7px; padding:.65rem 1rem; color:#fff; font-size:.9rem; font-weight:600;
      cursor:pointer; transition:opacity .2s;
    }
    .tv-auth-btn:hover { opacity:.9; }
    .tv-auth-error { color:var(--red); font-size:.8rem; text-align:center; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  
    /* ===== PÁGINA 3 – CENTRAL LOGÍSTICA AO VIVO ===== */
    .tv-logistics-page {
      width: 100%;
      height: 100%;
      padding: 1.1rem 1.4rem;
      display: grid;
      grid-template-columns: 300px 1fr 270px;
      gap: 1.1rem;
      overflow: hidden;
    }

    .tv-log-panel {

<script>
// ===================================================
// TV MODE – setores atualizados + envase separado + amostras + tempos
// ===================================================
const TV_API_BASE = 'tables/';
let tvState = { lots: [], routes: [], orders: [], currentUser: null };
let tvUpdateInterval = null;
let tvAutoScrollInterval = null;
let tvCurrentPage = 0;
let tvRoutePageIndex = 0;

// Ordem atual do FactoryFlow
// Mantém Envase – Produzir e Envase – Enlatamento separados.
const TV_ALL_SECTORS = [
  'coloracao_revisao',
  'laboratorio_revisao',
  'pcp_liberacao',
  'laboratorio_amostras',
  'coloracao_amostras',
  'pesagem',
  'producao',
  'coloracao',
  'laboratorio',
  'envase_produzir',
  'envase_enlatamento'
];

const TV_SECTOR_LABELS = {
  coloracao_revisao:   'Coloração (Rev.)',
  laboratorio_revisao: 'Lab. (Rev.)',
  pcp_liberacao:       'PCP (Lib.)',
  pesagem:             'Pesagem',
  producao:            'Produção',
  coloracao:           'Coloração',
  laboratorio:         'Laboratório',
  laboratorio_amostras:'Lab. Amostras',
  coloracao_amostras:  'Color. Amostras',
  envase_produzir:     'Envase Produzir',
  envase_enlatamento:  'Envase Enlat.',
  pronto:              'Pronto'
};

const TV_SECTOR_ICONS = {
  coloracao_revisao:   'fas fa-search-plus',
  laboratorio_revisao: 'fas fa-microscope',
  pcp_liberacao:       'fas fa-unlock',
  pesagem:             'fas fa-weight',
  producao:            'fas fa-cogs',
  coloracao:           'fas fa-palette',
  laboratorio:         'fas fa-flask',
  laboratorio_amostras:'fas fa-vial',
  coloracao_amostras:  'fas fa-fill-drip',
  envase_produzir:     'fas fa-box-open',
  envase_enlatamento:  'fas fa-boxes-packing',
  pronto:              'fas fa-check-circle'
};

const TV_SECTOR_COLORS = {
  coloracao_revisao:   '#e879f9',
  laboratorio_revisao: '#2dd4bf',
  pcp_liberacao:       '#f43f5e',
  pesagem:             '#3b82f6',
  producao:            '#8b5cf6',
  coloracao:           '#f59e0b',
  laboratorio:         '#10b981',
  laboratorio_amostras:'#14b8a6',
  coloracao_amostras:  '#facc15',
  envase_produzir:     '#f97316',
  envase_enlatamento:  '#06b6d4',
  pronto:              '#22c55e'
};

// Sectors that support work tracking (start/pause)
const TV_TRACKABLE = ['pesagem','producao','coloracao','laboratorio','laboratorio_amostras','coloracao_amostras','envase_produzir','envase_enlatamento'];

const PRODUCT_TYPE_LABELS = {
  tinta:'Tinta', diluente:'Diluente', endurecedor:'Endur.', base:'Base', amostra:'Amostra'
};
const PRIORITY_COLORS_TV = { normal:'#22c55e', urgent:'#f59e0b', sameday:'#ef4444' };

// How many columns per "page" (auto-scroll)
// With 9 sectors on a large screen we show all; on smaller resolution we paginate
const TV_COLS_PER_PAGE = 6; // 12 setores em 2 páginas automáticas

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const el = document.getElementById('tvClock');
  if (el) el.textContent = now.toLocaleTimeString('pt-BR');
  const de = document.getElementById('tvDate');
  if (de) de.textContent = now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
}

// ===== API =====
async function tvApiGet(table) {
  const res = await fetch(`${TV_API_BASE}${table}?limit=500`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return (await res.json()).data || [];
}


function tvNormalizeSector(rawSector, lot = {}) {
  const s = String(rawSector || '').trim().toLowerCase();
  if (!s) return '';

  // Compatibilidade com setores antigos salvos no banco.
  // IMPORTANTE: não converte envase_produzir para enlatamento.
  const tipo = String(lot.productType || lot.tipo || '').trim().toLowerCase();

  if (s === 'envase_produzir' || s === 'envase_enlatamento') return s;
  if (s === 'envase_producao' || s === 'envase_produção') return 'envase_produzir';
  if (s === 'enlatamento') return 'envase_enlatamento';

  // Se ainda vier como envase antigo, separa pelo tipo.
  // Diluente normalmente fica em Envase – Produzir.
  // Tinta/endurecedor/base vindo do Laboratório fica em Envase – Enlatamento.
  if (s === 'envase' || s === 'envase_antigo') {
    if (tipo === 'diluente') return 'envase_produzir';
    return 'envase_enlatamento';
  }

  return s;
}

function tvNormalizeLot(lot) {
  if (!lot) return lot;
  lot.sector = tvNormalizeSector(lot.sector || lot.stage || lot.status, lot);

  if (Array.isArray(lot.workSessions)) {
    lot.workSessions = lot.workSessions.map(sess => ({
      ...sess,
      sector: tvNormalizeSector(sess.sector, lot)
    }));
  }

  if (Array.isArray(lot.history)) {
    lot.history = lot.history.map(h => ({
      ...h,
      sector: tvNormalizeSector(h.sector, lot)
    }));
  }

  return lot;
}

function tvDeserializeLot(row) {
  let history=[], workSessions=[];
  try { history = typeof row.history==='string' ? JSON.parse(row.history) : (row.history||[]); } catch(e){}
  try { workSessions = typeof row.workSessions==='string' ? JSON.parse(row.workSessions) : (row.workSessions||[]); } catch(e){}
  const sea = Number(row.sectorEnteredAt) || (history.length>0 ? Number(history[history.length-1].timestamp) : Number(row.createdAt)) || Date.now();
  return tvNormalizeLot({
    ...row, history, workSessions,
    skipColor: row.skipColor===true||row.skipColor==='true',
    rejected: row.rejected===true||row.rejected==='true',
    qty: Number(row.qty)||0,
    createdAt: Number(row.createdAt)||0,
    sectorEnteredAt: sea,
    productType: row.productType||'tinta',
    lotStatus: row.lotStatus||'idle'
  });
}

async function tvLoadData() {
  const [lotsRaw, routesRaw, ordersRaw] = await Promise.all([
    tvApiGet('ff_lots'),
    tvApiGet('ff_routes').catch(()=>[]),
    // Algumas instalações não têm tabela ff_orders; nesse caso o TV monta os pedidos agrupando os lotes.
    tvApiGet('ff_orders').catch(()=>[])
  ]);

  tvState.lots   = lotsRaw.map(tvDeserializeLot).filter(l => !l.rejected);
  tvState.orders = Array.isArray(ordersRaw) ? ordersRaw : [];
  tvState.routes = routesRaw.map(r => {
    let lots=[];
    try { lots = typeof r.lots==='string' ? JSON.parse(r.lots) : (r.lots||[]); } catch(e){}
    return { ...r, lots, createdAt: Number(r.createdAt)||0 };
  });
}

// ===== TIME HELPERS =====
function tvIsLate(lot) {
  if (['entregue'].includes(lot.sector)) return false;
  if (!lot.deliveryDate) return false;
  return lot.deliveryDate < new Date().toISOString().split('T')[0];
}
function tvIsToday(d) { return d === new Date().toISOString().split('T')[0]; }

function tvGetTimeInSector(lot) {
  const entered = Number(lot.sectorEnteredAt) || Number(lot.createdAt) || 0;
  if (!entered) return 0;
  return Date.now() - entered;
}

function tvGetTimeSummary(lot) {
  const sector  = tvNormalizeSector(lot.sector, lot);
  const entered = Number(lot.sectorEnteredAt) || Number(lot.createdAt) || Date.now();
  const now     = Date.now();
  const total   = Math.max(0, now - entered);

  const sessions = (Array.isArray(lot.workSessions) ? lot.workSessions : [])
    .filter(s => tvNormalizeSector(s.sector, lot) === sector)
    .sort((a,b) => a.start - b.start);

  const worked = sessions.reduce((acc,s) => {
    const end = s.end || now;
    return acc + Math.max(0, end - s.start);
  }, 0);

  let paused = 0;
  for (let i=1; i<sessions.length; i++) {
    const pe = sessions[i-1].end, ns = sessions[i].start;
    if (pe) paused += Math.max(0, ns - pe);
  }
  if (lot.lotStatus==='paused' && sessions.length>0) {
    const lastEnd = sessions[sessions.length-1].end;
    if (lastEnd) paused += Math.max(0, now - lastEnd);
  }
  const idle = Math.max(0, total - worked - paused);
  return { total, worked, paused, idle };
}

function tvFormatMs(ms) {
  if (!ms || ms < 0) return '0m';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h${m>0?m+'m':''}`;
  return `${m}m`;
}

function tvEscape(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

function tvFormatDate(d) {
  if (!d) return '–';
  const [y,mo,dd] = d.split('-');
  return `${dd}/${mo}`;
}

// Average time stats for a sector (for footer label)
function tvGetSectorAvgStats(sector) {
  const lotsHere = tvState.lots.filter(l => tvNormalizeSector(l.sector, l) === sector);
  if (lotsHere.length === 0) return null;
  let sumW=0, sumP=0, sumT=0;
  lotsHere.forEach(l => {
    const s = tvGetTimeSummary(l);
    sumT += s.total; sumW += s.worked; sumP += s.paused;
  });
  return { avgTotal: sumT/lotsHere.length, avgWorked: sumW/lotsHere.length, avgPaused: sumP/lotsHere.length };
}

function tvGetAlerts() {
  const thr = 2 * 3600000;
  return tvState.lots.filter(l => {
    if (['entrega','entregue'].includes(tvNormalizeSector(l.sector,l))) return false;
    return tvGetTimeInSector(l) > thr;
  });
}


// ===== PEDIDOS / EXPEDIÇÃO HELPERS =====
function tvLotOrderKey(lot) {
  return String(
    lot.orderNumber || lot.order || lot.pedido || lot.pits_pedido || lot.orderId || lot.order_id || lot.number || ''
  ).trim();
}

function tvRouteLotIds(routes, onlyActive = true) {
  const ids = new Set();
  (routes || []).forEach(r => {
    if (onlyActive && !['in_progress','active','started','em_rota'].includes(String(r.status || '').toLowerCase())) return;
    (Array.isArray(r.lots) ? r.lots : []).forEach(x => {
      if (Array.isArray(x.lotIds)) x.lotIds.forEach(id => ids.add(String(id)));
      ['lotId','id','number','op'].forEach(k => { if (x && x[k] != null) ids.add(String(x[k])); });
    });
  });
  return ids;
}

function tvIsLotInActiveRoute(lot, routes) {
  const ids = tvRouteLotIds(routes, true);
  return ids.has(String(lot.id || '')) || ids.has(String(lot.number || '')) || ids.has(String(lot.op || ''));
}

function tvGroupLotsByOrder(lots) {
  const map = new Map();
  lots.forEach(lot => {
    const key = tvLotOrderKey(lot) || String(lot.client || lot.id || lot.number || 'Pedido');
    if (!map.has(key)) {
      map.set(key, {
        order: key,
        client: lot.client || lot.customer || 'Cliente não informado',
        city: lot.city || '',
        deliveryDate: lot.deliveryDate || '',
        priority: lot.priority || 'normal',
        lots: []
      });
    }
    const item = map.get(key);
    item.lots.push(lot);
    if (lot.priority === 'sameday' || (lot.priority === 'urgent' && item.priority !== 'sameday')) item.priority = lot.priority;
    if (!item.deliveryDate && lot.deliveryDate) item.deliveryDate = lot.deliveryDate;
    if (!item.city && lot.city) item.city = lot.city;
  });

  return [...map.values()].sort((a,b) => {
    const po = { sameday: 0, urgent: 1, normal: 2 };
    const pa = po[a.priority] ?? 2;
    const pb = po[b.priority] ?? 2;
    if (pa !== pb) return pa - pb;
    return String(a.deliveryDate || '').localeCompare(String(b.deliveryDate || ''));
  });
}

function tvBuildOrderMiniCard(order, statusClass, statusText, icon = 'fas fa-clipboard-list') {
  const lots = order.lots || [];
  const mainLots = lots.slice(0, 3);
  const qty = lots.reduce((sum,l) => sum + (Number(l.qty) || 0), 0);
  return `
    <div class="tv-order-mini-card ${statusClass}">
      <div class="tv-order-mini-top">
        <div class="tv-order-mini-number"><i class="${icon}"></i> Pedido ${tvEscape(order.order || '-')}</div>
        <div class="tv-order-mini-badge ${statusClass}">${statusText}</div>
      </div>
      <div class="tv-order-mini-client">${tvEscape(order.client || 'Cliente')}</div>
      <div class="tv-order-mini-meta">
        <span><i class="fas fa-boxes-stacked"></i> ${lots.length} lote(s)</span>
        <span><i class="fas fa-weight-hanging"></i> ${qty || 0} Kg</span>

// ===== RENDER =====

function tvBuildFocusLot(lot, options = {}) {
  lot = tvNormalizeLot(lot);
  const ts = tvGetTimeSummary(lot);
  const late = tvIsLate(lot);
  const hot = lot.priority === 'urgent';
  const danger = lot.priority === 'sameday' || late || (ts.total > 7200000);
  const badge = danger ? 'Atenção' : hot ? 'Urgente' : (TV_SECTOR_LABELS[lot.sector] || 'Fluxo');
  const badgeStyle = danger
    ? 'background:rgba(251,113,133,.16);color:#fb7185;border:1px solid rgba(251,113,133,.32)'
    : hot
    ? 'background:rgba(251,146,60,.16);color:#fb923c;border:1px solid rgba(251,146,60,.32)'
    : 'background:rgba(34,197,94,.13);color:#4ade80;border:1px solid rgba(34,197,94,.28)';

  return `
    <div class="tv-focus-lot ${hot ? 'hot' : ''} ${danger ? 'danger' : ''}">
      <div class="tv-focus-top">
        <div class="tv-focus-number">#${tvEscape(lot.number || '')}</div>
        <div class="tv-focus-badge" style="${badgeStyle}">${badge}</div>
      </div>
      <div class="tv-focus-client">${tvEscape(lot.client || 'Cliente não informado')}</div>
      <div class="tv-focus-paint">${tvEscape(lot.paint || lot.productCode || 'Produto não informado')}</div>
      <div class="tv-focus-meta">
        <span><i class="fas fa-clock"></i> ${tvFormatMs(ts.total)}</span>
        <span><i class="fas fa-box"></i> ${tvEscape(lot.qty || '')}${tvEscape(lot.unit || 'Kg')}</span>
        <span><i class="fas fa-calendar"></i> ${tvFormatDate(lot.deliveryDate)}</span>
      </div>
    </div>`;
}


function tvBuildReadyStatusItem(lot, routes = []) {
  lot = tvNormalizeLot(lot);

  const inRoute = routes.some(r => {
    if (r.status !== 'in_progress') return false;
    const routeLots = Array.isArray(r.lots) ? r.lots : [];
    return routeLots.some(x =>
      String(x.lotId || x.id || x.number || '') === String(lot.id || lot.number || '')
    );
  });

  const statusText = inRoute ? 'Em rota' : 'Pronto';
  const badgeClass = inRoute ? 'route' : 'ready';

  return `
    <div class="tv-ready-status-item ${inRoute ? 'in-route' : ''}">
      <div class="tv-ready-status-order">#${tvEscape(lot.number || '')}</div>

      <div style="min-width:0">
        <div class="tv-ready-status-client">${tvEscape(lot.client || 'Cliente não informado')}</div>
        <div class="tv-ready-status-paint">${tvEscape(lot.paint || lot.productCode || 'Produto não informado')}</div>
      </div>

      <div class="tv-ready-status-badge ${badgeClass}">
        ${statusText}
      </div>
    </div>`;
}

function tvRenderProductionPro(lots, routes, visibleSectors, totalPages) {
  const colsDiv = document.getElementById('tvColumns');
  const bottom = document.querySelector('.tv-bottombar');
  if (bottom) bottom.style.display = 'flex';

  // Página 1: central de produção com foco em gargalos e setores principais
  if (tvCurrentPage === 0) {
    const mainSectors = ['pcp_liberacao', 'pesagem', 'producao', 'coloracao', 'laboratorio', 'envase_produzir'];
    const priorityLots = [...lots]
      .filter(l => !['entrega','entregue'].includes(tvNormalizeSector(l.sector,l)))
      .sort((a,b) => {
        const score = x => (x.priority === 'sameday' ? 100000 : x.priority === 'urgent' ? 60000 : 0) + tvGetTimeInSector(x);
        return score(b) - score(a);
      })
      .slice(0, 4);

    const readyLots = lots.filter(l => tvNormalizeSector(l.sector,l) === 'pronto').slice(0, 10);
    const alertLots = tvGetAlerts().slice(0, 4);

    colsDiv.innerHTML = `
      <div class="tv-production-hero">
        <div class="tv-hero-main">
          ${mainSectors.map(sector => {
            const sectorLots = lots
              .filter(l => tvNormalizeSector(l.sector,l) === sector)
              .sort((a,b) => tvGetTimeInSector(b) - tvGetTimeInSector(a))
              .slice(0, 4);
            return `
              <div class="tv-super-card">
                <div class="tv-super-card-header">
                  <div class="tv-super-title" style="color:${TV_SECTOR_COLORS[sector] || '#93c5fd'}">
                    <i class="${TV_SECTOR_ICONS[sector] || 'fas fa-circle'}"></i>
                    ${TV_SECTOR_LABELS[sector] || sector}
                  </div>
                  <div class="tv-super-count">${lots.filter(l => tvNormalizeSector(l.sector,l) === sector).length}</div>
                </div>
                <div class="tv-super-list">
                  ${sectorLots.length ? sectorLots.map(l => tvBuildFocusLot(l)).join('') : `

                  `}

              </div>`;
          }).join('')}
        </div>

        <div class="tv-hero-side">
          <div class="tv-super-card">

              <div class="tv-super-title" style="color:#fb923c">
                <i class="fas fa-bolt"></i> Prioridades e gargalos
              </div>
              <div class="tv-super-count">${priorityLots.length}</div>
            </div>
            <div class="tv-super-list">
              ${priorityLots.length ? priorityLots.map(l => tvBuildFocusLot(l)).join('') : `
                <div class="tv-empty-col"><i class="fas fa-check"></i><span>Sem prioridade crítica</span></div>
              `}

          </div>

          <div class="tv-super-card">

              </div>
              <div class="tv-super-count">${lots.filter(l => tvNormalizeSector(l.sector,l) === 'pronto').length}</div>
            </div>
            <div class="tv-ready-status-list">
              ${readyLots.length ? readyLots.map(l => tvBuildReadyStatusItem(l, routes)).join('') : `
                <div class="tv-empty-col"><i class="fas fa-box-open"></i><span>Nenhum pronto</span></div>
              `}
            </div>
          </div>
        </div>
      </div>
    `;
    return true;
  }

  // Página 2: kanban completo, elegante, com setores restantes
  return false;
}

function tvRender() {
  const lots   = tvState.lots.map(tvNormalizeLot);

  // PATCH: garante reset visual da barra inferior quando sair das páginas especiais
  const __tvBottom = document.querySelector('.tv-bottombar');
  if (__tvBottom) __tvBottom.style.display = 'flex';

  const totalSectorPages = Math.max(1, Math.ceil(TV_ALL_SECTORS.length / TV_COLS_PER_PAGE));
      const totalPages = totalSectorPages + 3; // páginas produção + expedição + pedidos + rotas

  tvCurrentPage = tvCurrentPage % totalPages;

  const isExpeditionPage = tvCurrentPage === totalPages - 3;
  const isOrdersPage     = tvCurrentPage === totalPages - 2;
  const isRoutesPage     = tvCurrentPage === totalPages - 1;

  const visibleSectors = (isExpeditionPage || isOrdersPage || isRoutesPage)
    ? []

        tvCurrentPage * TV_COLS_PER_PAGE,
        (tvCurrentPage + 1) * TV_COLS_PER_PAGE

  // Metrics bar
  const inProd  = lots.filter(l => !['entrega','entregue'].includes(tvNormalizeSector(l.sector, l))).length;
  const ready   = lots.filter(l => tvNormalizeSector(l.sector, l)==='pronto').length;
  const inRoute = lots.filter(l => tvNormalizeSector(l.sector, l)==='entrega').length;
  const late    = lots.filter(l => tvIsLate(l)).length;
  const urgent  = lots.filter(l => ['urgent','sameday'].includes(l.priority) && tvNormalizeSector(l.sector,l)!=='entregue').length;
  const working = lots.filter(l => l.lotStatus==='working').length;

  const delivered = lots.filter(l => tvNormalizeSector(l.sector,l)==='entregue').length;
  const newOrdersMetric = tvGroupLotsByOrder(lots.filter(l => ['pcp_liberacao','coloracao_revisao','laboratorio_revisao'].includes(tvNormalizeSector(l.sector,l)))).length;

  document.getElementById('tvMetricsBar').innerHTML = `

    <div class="tv-metric-chip green"><i class="fas fa-play-circle"></i> ${working} trab.</div>

    <div class="tv-metric-chip purple"><i class="fas fa-inbox"></i> ${newOrdersMetric} novos</div>
    <div class="tv-metric-chip orange"><i class="fas fa-check"></i> ${ready} pronto</div>
    <div class="tv-metric-chip green"><i class="fas fa-box-circle-check"></i> ${delivered} entreg.</div>
    ${inRoute > 0 ? `<div class="tv-metric-chip orange"><i class="fas fa-truck"></i> ${inRoute} rota</div>` : ''}
    ${urgent > 0  ? `<div class="tv-metric-chip red"><i class="fas fa-bolt"></i> ${urgent} urg.</div>` : ''}
    ${late > 0    ? `<div class="tv-metric-chip red"><i class="fas fa-exclamation"></i> ${late} atras.</div>` : ''}
  `;

  const dots = document.getElementById('tvPageDots');
  if (dots) {
    dots.innerHTML = Array.from({ length: totalPages }, (_, i) =>
      `<div class="tv-page-dot ${i === tvCurrentPage ? 'active' : ''}"></div>`
    ).join('');
  }

  // Produção premium
  if (!isExpeditionPage && !isRoutesPage && tvRenderProductionPro(lots, routes, visibleSectors, totalPages)) {
    // Bottom bar – in route
    const activeRoutes = routes.filter(r => r.status==='in_progress');
    document.getElementById('tvDeliveryChips').innerHTML = activeRoutes.length > 0
      ? activeRoutes.map(r => `
          <div class="tv-delivery-chip"><i class="fas fa-truck"></i> ${tvEscape(r.driverName || 'Motorista')} – ${(Array.isArray(r.lots)?r.lots:[]).length} paradas</div>

              <div class="tv-log-next-box">
                <div class="tv-log-next-label"><i class="fas fa-location-dot"></i> Próxima entrega</div>
                <div class="tv-log-next-client">${tvEscape(nextLot?.client || '-')}</div>
                <div class="tv-log-next-product">${tvEscape(nextLot?.paint || nextLot?.productCode || '')}</div>
              </div>

              <div class="tv-log-mini-map">
                <div class="tv-log-map-point next">
                  <span class="tv-log-map-dot"></span>
                  <span>Fábrica → ${tvEscape(nextLot?.client || 'Próxima parada')}</span>
                </div>
                ${routeLots.slice(1, 5).map(lot => `
                  <div class="tv-log-map-point">
                    <span class="tv-log-map-dot"></span>
                    <span>${tvEscape(lot.client || 'Cliente')}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <div style="
              background:rgba(15,23,42,.7);
              border:1px solid rgba(59,130,246,.16);
              border-radius:18px;
              padding:1rem;
            ">
              <div style="color:#60a5fa;font-size:.75rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:.7rem">
                Resumo da rota
              </div>

              <div style="display:flex;justify-content:space-between;margin-bottom:.55rem;color:#94a3b8;font-size:.85rem">
                <span>Status</span>
                <strong style="color:#4ade80">Ao vivo</strong>
              </div>

              <div style="display:flex;justify-content:space-between;margin-bottom:.55rem;color:#94a3b8;font-size:.85rem">
                <span>Motorista</span>
                <strong style="color:#e2e8f0">${tvEscape(route.driverName || '-')}</strong>
              </div>

              <div style="display:flex;justify-content:space-between;color:#94a3b8;font-size:.85rem">
                <span>Produtos</span>
                <strong style="color:#e2e8f0">${routeLots.length}</strong>
              </div>
            </div>
          </section>
        </div>
      `;
    }
  } else {
    const bottom = document.querySelector('.tv-bottombar');
    if (bottom) bottom.style.display = 'flex';

    colsDiv.innerHTML = visibleSectors.map(sector => {
    const sectorLots = lots.filter(l => tvNormalizeSector(l.sector, l) === sector);
    sectorLots.sort((a,b) => {
      const po = {sameday:0, urgent:1, normal:2};
      if (po[a.priority] !== po[b.priority]) return po[a.priority]-po[b.priority];
      return tvGetTimeInSector(b) - tvGetTimeInSector(a);
    });

    const count = sectorLots.length;
    const icon  = TV_SECTOR_ICONS[sector] || 'fas fa-circle';
    const color = TV_SECTOR_COLORS[sector] || '#6b7280';
    const isReview = ['coloracao_revisao','laboratorio_revisao','pcp_liberacao'].includes(sector);
    const isSample = ['laboratorio_amostras','coloracao_amostras'].includes(sector);

    // Avg stats for sector footer
    const avg = tvGetSectorAvgStats(sector);

    return `
      <div class="tv-column col-${sector}">
        <div class="tv-col-header">
          <div class="tv-col-title">
            <div class="tv-col-icon"><i class="${icon}"></i></div>
            <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${color}">${TV_SECTOR_LABELS[sector]}</span>
            ${isReview ? '<span style="font-size:.52rem;background:rgba(255,255,255,.07);padding:.08rem .3rem;border-radius:3px;color:#6b7280;letter-spacing:0">REV</span>' : ''}
            ${isSample ? '<span style="font-size:.52rem;background:rgba(250,204,21,.12);padding:.08rem .3rem;border-radius:3px;color:#facc15;letter-spacing:0">AMOSTRA</span>' : ''}
          </div>
          <div class="tv-col-count">${count}</div>
        </div>
        <div class="tv-col-body">
          ${count === 0
            ? `<div class="tv-empty-col"><i class="fas fa-inbox"></i><span>Vazio</span></div>`
            : sectorLots.map(lot => tvBuildCard(lot)).join('')}
        </div>
        ${avg && TV_TRACKABLE.includes(sector) ? `
        <div class="tv-sector-stats">
          <span class="sw" title="Média trabalhado"><i class="fas fa-play-circle"></i> ${tvFormatMs(avg.avgWorked)}</span>
          <span class="sp" title="Média pausado"><i class="fas fa-pause-circle"></i> ${tvFormatMs(avg.avgPaused)}</span>
          <span class="si" title="Média total"><i class="fas fa-clock"></i> ${tvFormatMs(avg.avgTotal)}</span>
        </div>` : ''}
      </div>`;
  }).join('');
  }

  // Bottom bar – in route
  const activeRoutes = routes.filter(r => r.status==='in_progress');
  document.getElementById('tvDeliveryChips').innerHTML = activeRoutes.length > 0
    ? activeRoutes.map(r => `
        <div class="tv-delivery-chip"><i class="fas fa-truck"></i> ${r.driverName} – ${(Array.isArray(r.lots)?r.lots:[]).length} paradas</div>
      `).join('')
    : '<span style="color:#334155;font-size:.65rem">Nenhuma rota</span>';

  // Ready lots
  const readyLots = lots.filter(l => tvNormalizeSector(l.sector,l)==='pronto');
  document.getElementById('tvReadyChips').innerHTML = readyLots.length > 0
    ? readyLots.slice(0,8).map(l => `
        <div class="tv-ready-chip">#${tvEscape(l.number)} – ${tvEscape(String(l.client || '').length>10 ? String(l.client).slice(0,10)+'…' : (l.client || ''))}</div>
      `).join('')
    : '<span style="color:#334155;font-size:.65rem">Nenhum pronto</span>';

  // Alerts
  const alerts = tvGetAlerts();
  document.getElementById('tvAlertChips').innerHTML = alerts.length > 0
    ? alerts.slice(0,6).map(l => {
        const t = tvGetTimeInSector(l);
        return `<div class="tv-alert-chip"><i class="fas fa-clock"></i> #${l.number} ${tvFormatMs(t)}</div>`;
      }).join('')
    : '<span style="color:#334155;font-size:.65rem">Sem alertas</span>';

  // Last update timestamp
  const upEl = document.getElementById('tvLastUpdate');
  if (upEl) upEl.textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
}

function tvBuildCard(lot) {
  lot = tvNormalizeLot(lot);
  const pColor   = PRIORITY_COLORS_TV[lot.priority] || '#22c55e';
  const late     = tvIsLate(lot);
  const today    = tvIsToday(lot.deliveryDate);
  const ts       = tvGetTimeSummary(lot);
  const isAlert  = ts.total > 7200000;
  const pt       = lot.productType || 'tinta';
  const isTrack  = TV_TRACKABLE.includes(lot.sector);
  const status   = lot.lotStatus || 'idle';

  const urgentTag = lot.priority==='sameday'
    ? `<div class="tv-urgent-marker sameday-tag">HOJE</div>`
    : lot.priority==='urgent'
    ? `<div class="tv-urgent-marker urgent-tag">URG</div>`
    : '';

  const statusDot = status==='working'
    ? `<span class="tv-status-dot working"></span>`
    : status==='paused'
    ? `<span class="tv-status-dot paused"></span>`
    : '';

  // Time bar (only for trackable sectors)
  const totalMs = ts.total || 1;
  const wPct = Math.min(100, Math.round(ts.worked/totalMs*100));
  const pPct = Math.min(100-wPct, Math.round(ts.paused/totalMs*100));

  const timeBar = isTrack ? `
    <div class="tv-time-bar-wrap">
      <div class="tv-time-bar">
        <div class="tv-tbar-worked" style="width:${wPct}%"></div>
        <div class="tv-tbar-paused" style="width:${pPct}%"></div>
        <div class="tv-tbar-idle"></div>
      </div>
      <div class="tv-tbar-labels">
        <span class="tw">▶${tvFormatMs(ts.worked)}</span>
        ${ts.paused>0 ? `<span class="tp">⏸${tvFormatMs(ts.paused)}</span>` : ''}
      </div>
    </div>` : '';

  return `
    <div class="tv-lot-card priority-${lot.priority} ${late?'late-lot':''}">
      ${urgentTag}
      <div class="tv-card-row1">
        <div class="tv-lot-number">${statusDot}#${lot.number}</div>
        <div class="tv-priority-dot" style="background:${pColor}"></div>
      </div>
      <div class="tv-lot-client"><i class="fas fa-building" style="opacity:.4;margin-right:.2rem;font-size:.6rem"></i>${tvEscape(lot.client || '')}</div>
      <div class="tv-lot-paint">${tvEscape(lot.paint || lot.productCode || '')} · ${lot.qty}${tvEscape(lot.unit||'Kg')}</div>
      <div class="tv-card-row2">
        <span class="tv-product-type type-${pt}">${PRODUCT_TYPE_LABELS[pt]||pt}</span>
        <span class="tv-time-chip ${isAlert?'alert-time':''}"><i class="fas fa-clock"></i>${tvFormatMs(ts.total)}</span>
        <span class="tv-delivery-date ${late?'late':today?'today':''}">${late?'⚠️':today?'📅':''}${tvFormatDate(lot.deliveryDate)}</span>
      </div>
      ${timeBar}
    </div>`;
}

// ===== HASH FNV-1a (inline para tv.html) =====
function tvFnv1a32(str) {
  let hash = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i);
    hash = Math.imul(hash, 0x01000193);
    hash = hash >>> 0;
  }
  return hash.toString(16).padStart(8, '0');
}
function tvVerifyPassword(entered, stored) {
  if (!stored) return false;
  if (stored.includes(':')) {
    const [salt] = stored.split(':');
    let h = tvFnv1a32(salt + entered);
    for (let r = 0; r < 3; r++) h = tvFnv1a32(salt + h + entered);
    return `${salt}:${h}` === stored;
  }
  return entered === stored; // legado
}
async function tvHandleLogin(e) {
  e.preventDefault();
  const login = document.getElementById('tvUser').value.trim();
  const pass  = document.getElementById('tvPass').value;
  try {
    const users = await tvApiGet('ff_users');
    const user  = users.find(u => u.login===login && tvVerifyPassword(pass, u.password));
    if (!user || !['admin','diretoria','pcp','pcp_lib','manager','tv'].includes(user.role)) {
      document.getElementById('tvAuthError').style.display = 'block'; return;
    }
    document.getElementById('tvAuthError').style.display = 'none';
    tvState.currentUser = user;
    await tvInit();
  } catch(err) { alert('Erro ao conectar: '+err.message); }
}

// ===== INIT =====
async function tvInit() {
  document.getElementById('tvAuthScreen').style.display = 'none';
  document.getElementById('tvLoading').style.display = 'flex';
  try {
    await tvLoadData();
    document.getElementById('tvLoading').style.display = 'none';
    document.getElementById('tvPanel').style.display = 'flex';
    tvRender();

    // Refresh every 5 seconds
    tvUpdateInterval = setInterval(async () => {
      try { await tvLoadData(); tvRender(); } catch(e){}
    }, 5000);

    // Troca automática entre as páginas de setores
    if (tvAutoScrollInterval) clearInterval(tvAutoScrollInterval);
    tvAutoScrollInterval = setInterval(() => {
      const totalSectorPages = Math.max(1, Math.ceil(TV_ALL_SECTORS.length / TV_COLS_PER_PAGE));
      const totalPages = totalSectorPages + 3;
      tvCurrentPage = (tvCurrentPage + 1) % totalPages;
      tvRender();
    }, 12000);

  } catch(err) {
    document.getElementById('tvLoading').innerHTML = `
      <div class="tv-loading-logo"><i class="fas fa-exclamation-triangle" style="color:#ef4444"></i></div>
      <h2 style="color:#ef4444">Erro de Conexão</h2>
      <p style="color:#94a3b8">${err.message}</p>
      <a href="index.html" style="color:#3b82f6;font-size:.85rem">← Voltar</a>`;
  }
}
async function tvCheckAuth() {
  try {
    const user = sessionStorage.getItem('ff_tv') || sessionStorage.getItem('ff_user');
    if (!user) return false;

    const parsed = JSON.parse(user);

    // valida se é usuário TV ou superior
    if (!['admin','diretoria','pcp','pcp_lib','manager','tv'].includes(parsed.role)) {
      return false;
    }

    tvState.currentUser = parsed;
    return true;

  } catch (e) {
    return false;
  }
}
// ===== STARTUP =====
(async () => {
  updateClock();
  setInterval(updateClock, 1000);
  const authed = await tvCheckAuth();
  if (authed) { await tvInit(); }
  else {
    document.getElementById('tvLoading').style.display = 'none';
    document.getElementById('tvAuthScreen').style.display = 'flex';
  }
})();
</script>
