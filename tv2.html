<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FactoryFlow – Painel de Estatísticas</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* =============================================================
   TV2 – STATISTICS DASHBOARD  (auto-rotating slides)
   ============================================================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:        #030712;
  --bg2:       #060f23;
  --surface:   #0b1a35;
  --surface2:  #0f2347;
  --border:    #162d55;
  --border2:   #1e3a6e;
  --text:      #e8f4ff;
  --text2:     #6ea8e0;
  --text3:     #3a5f8a;
  --blue:      #2563eb;
  --blue2:     #3b82f6;
  --green:     #16a34a;
  --green2:    #22c55e;
  --yellow:    #d97706;
  --yellow2:   #f59e0b;
  --red:       #dc2626;
  --red2:      #ef4444;
  --orange:    #ea580c;
  --orange2:   #f97316;
  --purple:    #7c3aed;
  --purple2:   #8b5cf6;
  --cyan:      #0891b2;
  --cyan2:     #06b6d4;
  --fuchsia2:  #e879f9;
  --teal2:     #2dd4bf;
  --rose2:     #f43f5e;
}

html,body{
  height:100%; font-family:'Space Grotesk','Inter',sans-serif;
  background:var(--bg); color:var(--text);
  overflow:hidden; cursor:none;
}

/* ── Animated Background ── */
.scene-bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.nebula{position:absolute;border-radius:50%;filter:blur(100px);opacity:.06;pointer-events:none;}
.nebula-1{width:700px;height:700px;top:-200px;left:-150px;background:radial-gradient(circle,#2563eb,transparent 70%);animation:nd 22s ease-in-out infinite alternate;}
.nebula-2{width:600px;height:600px;top:30%;right:-200px;background:radial-gradient(circle,#7c3aed,transparent 70%);animation:nd 18s ease-in-out infinite alternate;animation-delay:-8s;}
.nebula-3{width:800px;height:500px;bottom:-150px;left:25%;background:radial-gradient(circle,#0891b2,transparent 70%);animation:nd 25s ease-in-out infinite alternate;animation-delay:-14s;}
@keyframes nd{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40px,30px) scale(1.1);}}
.grid-bg{
  position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(59,130,246,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.02) 1px,transparent 1px);
  background-size:80px 80px; animation:gd 40s linear infinite;
}
@keyframes gd{from{transform:translateY(0);}to{transform:translateY(80px);}}
.scanlines{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);}

/* ── App Shell ── */
#app{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr auto;height:100vh;overflow:hidden;}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem 1.6rem;
  background:rgba(3,7,18,.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(24px) saturate(180%);
  gap:1rem; flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:.8rem;flex-shrink:0;}
.brand-orb{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#2563eb 0%,#7c3aed 50%,#0891b2 100%);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  box-shadow:0 0 30px rgba(37,99,235,.5),inset 0 1px 0 rgba(255,255,255,.15);
  position:relative;overflow:hidden;
}
.brand-orb::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 60%);}
.brand-text h1{
  font-size:1.1rem;font-weight:800;letter-spacing:1.5px;
  background:linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-size:200% auto;animation:shimmer 4s linear infinite;
}
@keyframes shimmer{to{background-position:200% center;}}
.brand-text p{font-size:.58rem;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:.1rem;}

.topbar-clock{display:flex;flex-direction:column;align-items:center;gap:.05rem;}
.clock-time{
  font-size:2.2rem;font-weight:700;letter-spacing:2px;font-variant-numeric:tabular-nums;
  background:linear-gradient(180deg,#e8f4ff,#6ea8e0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 14px rgba(59,130,246,.6));line-height:1;
}
.clock-date{font-size:.62rem;color:var(--text3);letter-spacing:1px;text-transform:capitalize;}

.live-badge{
  display:flex;align-items:center;gap:.45rem;
  background:rgba(22,163,74,.12);border:1px solid rgba(34,197,94,.35);
  border-radius:20px;padding:.28rem .8rem;font-size:.7rem;font-weight:700;color:#4ade80;
}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 8px #22c55e;animation:ping 1.4s ease-in-out infinite;}
@keyframes ping{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(34,197,94,.7);}50%{transform:scale(1.1);box-shadow:0 0 0 6px rgba(34,197,94,0);}}

.back-link{color:var(--text3);font-size:.72rem;text-decoration:none;
  display:flex;align-items:center;gap:.3rem;transition:color .2s;flex-shrink:0;}
.back-link:hover{color:var(--blue2);}

/* ── SLIDE AREA ── */
.slide-area{position:relative;overflow:hidden;min-height:0;}

.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:.8rem 1.4rem;gap:.75rem;
  overflow:hidden;
  opacity:0;transform:translateX(100%);
  transition:opacity .55s ease, transform .55s ease;
  pointer-events:none;
}
.slide.active{
  opacity:1;transform:translateX(0);
  pointer-events:auto;position:relative;
}
.slide.exit{opacity:0;transform:translateX(-100%);}

.slide-title{
  font-size:1rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  display:flex;align-items:center;gap:.6rem;flex-shrink:0;
}
.slide-title i{font-size:.9rem;}

/* ── BIG METRICS ROW ── */
.metrics-row{display:flex;gap:.8rem;flex-wrap:wrap;}
.metric-card{
  flex:1 1 120px;min-width:120px;
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:1rem 1.2rem;display:flex;flex-direction:column;gap:.3rem;
  position:relative;overflow:hidden;
}
.metric-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;
}
.metric-card.c-blue::before{background:var(--blue2);}
.metric-card.c-green::before{background:var(--green2);}
.metric-card.c-yellow::before{background:var(--yellow2);}
.metric-card.c-red::before{background:var(--red2);}
.metric-card.c-orange::before{background:var(--orange2);}
.metric-card.c-purple::before{background:var(--purple2);}
.metric-card.c-cyan::before{background:var(--cyan2);}
.metric-card.c-fuchsia::before{background:var(--fuchsia2);}
.metric-card.c-teal::before{background:var(--teal2);}
.metric-card.c-rose::before{background:var(--rose2);}
.metric-num{font-size:2.8rem;font-weight:800;line-height:1;letter-spacing:-1px;}
.metric-label{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.metric-sub{font-size:.6rem;color:var(--text3);margin-top:.15rem;}

.c-blue  .metric-num{color:var(--blue2);}
.c-green .metric-num{color:var(--green2);}
.c-yellow .metric-num{color:var(--yellow2);}
.c-red   .metric-num{color:var(--red2);}
.c-orange .metric-num{color:var(--orange2);}
.c-purple .metric-num{color:var(--purple2);}
.c-cyan  .metric-num{color:var(--cyan2);}
.c-fuchsia .metric-num{color:var(--fuchsia2);}
.c-teal .metric-num{color:var(--teal2);}
.c-rose .metric-num{color:var(--rose2);}

/* ── CHART CARDS ── */
.charts-row{display:flex;gap:.8rem;min-height:0;flex:1;}
.chart-card{
  flex:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:1rem 1.2rem;display:flex;flex-direction:column;gap:.5rem;min-height:0;overflow:hidden;
}
.chart-card h4{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:700;flex-shrink:0;}
.chart-card .chart-wrap{flex:1;min-height:0;position:relative;}

/* ── SECTOR TABLE ── */
.sector-table{width:100%;border-collapse:collapse;font-size:.75rem;}
.sector-table th{color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:.35rem .6rem;border-bottom:1px solid var(--border);}
.sector-table td{padding:.4rem .6rem;border-bottom:1px solid rgba(255,255,255,.03);}
.sector-table tr:last-child td{border-bottom:none;}
.sector-table tr:hover td{background:rgba(255,255,255,.02);}
.sector-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.4rem;}
.eff-bar-wrap{height:5px;background:rgba(255,255,255,.06);border-radius:3px;min-width:80px;}
.eff-bar{height:5px;border-radius:3px;transition:width .6s ease;}

/* ── ALERT LIST ── */
.alert-list{display:flex;flex-direction:column;gap:.4rem;overflow:hidden;}
.alert-row{
  background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:10px;
  padding:.5rem .8rem;display:flex;align-items:center;gap:.8rem;
}
.alert-row.a-warn{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.2);}
.alert-sector-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.alert-info{flex:1;min-width:0;}
.alert-num{font-size:.85rem;font-weight:700;}
.alert-client{font-size:.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.alert-time{font-size:.68rem;color:var(--text3);white-space:nowrap;}

/* ── TOP LIST ── */
.top-list{display:flex;flex-direction:column;gap:.35rem;}
.top-row{
  display:flex;align-items:center;gap:.7rem;
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.45rem .8rem;
}
.top-rank{
  width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:800;flex-shrink:0;
}
.top-name{font-size:.8rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-count{font-size:.75rem;color:var(--text2);white-space:nowrap;}
.top-badge{
  font-size:.58rem;padding:.07rem .4rem;border-radius:4px;font-weight:700;
  text-transform:uppercase;white-space:nowrap;
}

/* ── DELIVERY ITEMS ── */
.delivery-list{display:flex;flex-direction:column;gap:.35rem;overflow:hidden;}
.delivery-row{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:.45rem .8rem;display:flex;align-items:center;gap:.7rem;
}
.delivery-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.delivery-info{flex:1;min-width:0;}
.delivery-num{font-size:.8rem;font-weight:700;}
.delivery-meta{font-size:.65rem;color:var(--text2);}
.delivery-eta{font-size:.68rem;color:var(--text3);white-space:nowrap;}

/* ── EFFICIENCY GRID ── */
.eff-grid{display:flex;gap:.6rem;flex-wrap:wrap;}
.eff-cell{
  flex:1 1 140px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  padding:.7rem .8rem;display:flex;flex-direction:column;gap:.25rem;
}
.eff-cell-name{font-size:.62rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.eff-cell-val{font-size:1.4rem;font-weight:800;line-height:1;}
.eff-cell-sub{font-size:.58rem;color:var(--text3);}
.eff-mini-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:.3rem;}
.eff-mini-fill{height:4px;border-radius:2px;}

/* ── PRIORITY TABLE ── */
.prio-list{display:flex;flex-direction:column;gap:.35rem;overflow:hidden;}
.prio-row{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:.45rem .8rem;display:flex;align-items:center;gap:.7rem;
}
.prio-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.prio-info{flex:1;min-width:0;}
.prio-num{font-size:.82rem;font-weight:700;}
.prio-meta{font-size:.65rem;color:var(--text2);}
.prio-sector{font-size:.62rem;padding:.06rem .35rem;border-radius:4px;font-weight:700;white-space:nowrap;}

/* ── PROGRESS RING ── */
.ring-wrap{display:flex;align-items:center;justify-content:center;gap:2rem;flex:1;}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;}
.ring-label{font-size:.62rem;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;font-weight:600;text-align:center;}
.ring-val{font-size:1.3rem;font-weight:800;line-height:1;}
svg.ring{transform:rotate(-90deg);overflow:visible;}
.ring-track{fill:none;stroke:rgba(255,255,255,.06);}
.ring-fill{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}

/* ── BOTTOM BAR ── */
.bottombar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.35rem 1.4rem;
  background:rgba(3,7,18,.96);border-top:1px solid var(--border);
  gap:1rem;flex-shrink:0;
}
.bb-chips{display:flex;gap:.45rem;flex-wrap:wrap;align-items:center;}
.bb-chip{
  display:inline-flex;align-items:center;gap:.28rem;
  padding:.2rem .6rem;border-radius:7px;font-size:.68rem;font-weight:600;
  border:1px solid transparent;white-space:nowrap;
}
.bb-chip.c-blue{background:rgba(37,99,235,.15);border-color:rgba(59,130,246,.35);color:#60a5fa;}
.bb-chip.c-green{background:rgba(22,163,74,.15);border-color:rgba(34,197,94,.35);color:#4ade80;}
.bb-chip.c-yellow{background:rgba(217,119,6,.15);border-color:rgba(245,158,11,.35);color:#fbbf24;}
.bb-chip.c-red{background:rgba(220,38,38,.15);border-color:rgba(239,68,68,.35);color:#f87171;}
.bb-chip.c-orange{background:rgba(234,88,12,.15);border-color:rgba(249,115,22,.35);color:#fb923c;}
.bb-chip.c-purple{background:rgba(124,58,237,.15);border-color:rgba(139,92,246,.35);color:#a78bfa;}
.bb-chip.c-cyan{background:rgba(8,145,178,.15);border-color:rgba(6,182,212,.35);color:#22d3ee;}

/* ── SLIDE PROGRESS ── */
.slide-progress{
  position:fixed;bottom:42px;left:0;right:0;z-index:10;
  display:flex;gap:4px;padding:0 1.4rem;pointer-events:none;
}
.sp-bar{
  height:3px;flex:1;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;
}
.sp-fill{height:100%;background:var(--blue2);border-radius:2px;width:0%;transition:width linear;}
.sp-bar.done .sp-fill{width:100%;background:rgba(255,255,255,.25);}

/* ── AUTH SCREEN ── */
.auth-screen{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:rgba(3,7,18,.97);backdrop-filter:blur(20px);
}
.auth-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  padding:2.5rem 2rem;width:360px;display:flex;flex-direction:column;gap:1.2rem;
}
.auth-logo{display:flex;align-items:center;gap:.8rem;}
.auth-logo h2{font-size:1.3rem;font-weight:800;
  background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-subtitle{font-size:.72rem;color:var(--text3);}
.auth-input{
  width:100%;padding:.7rem .9rem;background:var(--bg2);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-family:inherit;font-size:.88rem;outline:none;
  transition:border-color .2s;
}
.auth-input:focus{border-color:var(--blue2);}
.auth-btn{
  width:100%;padding:.75rem;background:linear-gradient(135deg,#2563eb,#7c3aed);
  border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:.92rem;
  font-weight:700;cursor:pointer;transition:opacity .2s;
}
.auth-btn:hover{opacity:.9;}
.auth-error{color:var(--red2);font-size:.78rem;text-align:center;display:none;}

/* ── LOADING ── */
.loading-screen{
  position:fixed;inset:0;z-index:99;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
  background:var(--bg);
}
.loading-icon{font-size:3rem;animation:spin 1.5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:.88rem;color:var(--text3);}

/* ── UTILITIES ── */
.flex-col{display:flex;flex-direction:column;gap:.5rem;}
.flex-row{display:flex;gap:.6rem;align-items:center;}
.text-muted{color:var(--text3);}
.green{color:var(--green2);} .yellow{color:var(--yellow2);} .red{color:var(--red2);}
.orange{color:var(--orange2);} .purple{color:var(--purple2);} .cyan{color:var(--cyan2);}
.fuchsia{color:var(--fuchsia2);} .teal{color:var(--teal2);} .rose{color:var(--rose2);}
.late-tag{font-size:.6rem;padding:.05rem .3rem;border-radius:3px;background:rgba(239,68,68,.2);color:#fca5a5;font-weight:700;}
.today-tag{font-size:.6rem;padding:.05rem .3rem;border-radius:3px;background:rgba(245,158,11,.2);color:#fde68a;font-weight:700;}
</style>
</head>
<body>

<div class="scene-bg">
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
</div>
<div class="grid-bg"></div>
<div class="scanlines"></div>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="brand-orb" style="width:40px;height:40px;font-size:1.1rem;">🏭</div>
      <h2>FactoryFlow Stats</h2>
    </div>
    <div class="auth-subtitle">Painel de Estatísticas em Tempo Real</div>

    <!-- Acesso Rápido TV -->
    <div style="background:rgba(37,99,235,.1);border:1px solid rgba(59,130,246,.3);border-radius:12px;padding:.9rem 1rem;display:flex;flex-direction:column;gap:.5rem;">
      <div style="font-size:.72rem;color:var(--text2);font-weight:600;display:flex;align-items:center;gap:.4rem">
        <i class="fas fa-tv" style="color:var(--blue2)"></i> Acesso Rápido – Painel TV
      </div>
      <button class="auth-btn" type="button" onclick="quickTvLogin()"
        style="background:linear-gradient(135deg,#1d4ed8,#4338ca);padding:.6rem">
        <i class="fas fa-play-circle"></i> Abrir Painel TV (tv_painel)
      </button>
      <div style="font-size:.65rem;color:var(--text3);text-align:center">Login: <code>tv_painel</code> · Senha: <code>tv2025</code></div>
    </div>

    <div style="display:flex;align-items:center;gap:.6rem;margin:.1rem 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:.65rem;color:var(--text3)">ou entrar com outra conta</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    <form onsubmit="handleLogin(event)" style="display:flex;flex-direction:column;gap:.8rem;">
      <input class="auth-input" type="text"     id="authUser" placeholder="Login"  autocomplete="username"         required/>
      <input class="auth-input" type="password" id="authPass" placeholder="Senha"  autocomplete="current-password" required/>
      <div class="auth-error" id="authError">Usuário ou senha inválidos.</div>
      <button class="auth-btn" type="submit"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    </form>
    <div style="text-align:center">
      <a href="index.html" style="font-size:.72rem;color:var(--text3);">← Voltar ao sistema</a>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen" style="display:none;">
  <div class="loading-icon" style="color:var(--blue2)"><i class="fas fa-circle-notch"></i></div>
  <div class="loading-text">Carregando estatísticas...</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-orb">🏭</div>
      <div class="brand-text">
        <h1>FACTORYFLOW</h1>
        <p>Painel de Estatísticas</p>
      </div>
    </div>

    <div class="topbar-clock">
      <div class="clock-time" id="clockTime">00:00:00</div>

// ── XSS SAFETY ─────────────────────────────────────────
function esc(str){
  if(str==null)return'';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

// ── HASH FNV-1a ─────────────────────────────────────────
function fnv1a(str){
  let h=0x811c9dc5;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,0x01000193);h=h>>>0;}
  return h.toString(16).padStart(8,'0');
}
function verifyPwd(entered,stored){
  if(!stored)return false;
  if(stored.includes(':')){
    const[salt]=stored.split(':');
    let h=fnv1a(salt+entered);
    for(let r=0;r<3;r++)h=fnv1a(salt+h+entered);
    return`${salt}:${h}`===stored;
  }
  return entered===stored;
}
/** Gera hash FNV-1a + salt para armazenar a senha */
function hashFnv(password){
  const arr=new Uint8Array(8);
  crypto.getRandomValues(arr);
  const salt=Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('');
  let h=fnv1a(salt+password);
  for(let r=0;r<3;r++)h=fnv1a(salt+h+password);
  return`${salt}:${h}`;
}

// ── API ─────────────────────────────────────────────────
async function apiGet(t){
  const r=await fetch(`${API}${t}?limit=500`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return(await r.json()).data||[];
}

function deser(row){
  let h=[],ws=[];
  try{h=typeof row.history==='string'?JSON.parse(row.history):(row.history||[]);}catch(e){}
  try{ws=typeof row.workSessions==='string'?JSON.parse(row.workSessions):(row.workSessions||[]);}catch(e){}
  const sea=Number(row.sectorEnteredAt)||(h.length>0?Number(h[h.length-1].timestamp):Number(row.createdAt))||Date.now();
  return{...row,history:h,workSessions:ws,
    skipColor:row.skipColor===true||row.skipColor==='true',
    rejected:row.rejected===true||row.rejected==='true',
    rejectedAt:Number(row.rejectedAt)||null,
    rejectedBy:row.rejectedBy||'',
    rejectedReason:row.rejectedReason||'',
    rejectedSector:row.rejectedSector||'',
    qty:Number(row.qty)||0,createdAt:Number(row.createdAt)||0,
    sectorEnteredAt:sea,productType:row.productType||'tinta',lotStatus:row.lotStatus||'idle'};
}

async function loadData(){
  const[lr,rr]=await Promise.all([apiGet('ff_lots'),apiGet('ff_routes').catch(()=>[])]);
  S.lots  =lr.map(deser);
  S.routes=rr.map(r=>{
    let lots=[];
    try{lots=typeof r.lots==='string'?JSON.parse(r.lots):(r.lots||[]);}catch(e){}
    return{...r,lots,createdAt:Number(r.createdAt)||0};
  });
}

// ── HELPERS ─────────────────────────────────────────────
function timeInSector(lot){const e=Number(lot.sectorEnteredAt)||Number(lot.createdAt)||0;return e?Date.now()-e:0;}
function isLate(lot){if(lot.sector==='entregue')return false;return lot.deliveryDate<new Date().toISOString().split('T')[0];}
function isToday(d){return d===new Date().toISOString().split('T')[0];}
function fms(ms){
  if(!ms||ms<0)return'0m';
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  if(h>0)return`${h}h${m>0?m+'m':''}`;
  if(m>0)return`${m}m${s>0?s+'s':''}`;
  return`${s}s`;
}
function fdate(d){if(!d)return'–';const[,mo,dd]=d.split('-');return`${dd}/${mo}`;}

function timeSummary(lot){
  const sec=lot.sector,entered=Number(lot.sectorEnteredAt)||Number(lot.createdAt)||Date.now(),now=Date.now();
  const total=Math.max(0,now-entered);
  const sessions=(Array.isArray(lot.workSessions)?lot.workSessions:[]).filter(s=>s.sector===sec).sort((a,b)=>a.start-b.start);
  const worked=sessions.reduce((a,s)=>a+Math.max(0,(s.end||now)-s.start),0);
  let paused=0;
  for(let i=1;i<sessions.length;i++){const pe=sessions[i-1].end,ns=sessions[i].start;if(pe)paused+=Math.max(0,ns-pe);}
  if(lot.lotStatus==='paused'&&sessions.length>0){const le=sessions[sessions.length-1].end;if(le)paused+=Math.max(0,now-le);}
  return{total,worked,paused,idle:Math.max(0,total-worked-paused)};
}

function sectorStats(sec){
  const lots=S.lots.filter(l=>l.sector===sec);
  if(!lots.length)return{count:0,worked:0,paused:0,total:0,idle:0};
  let st=0,sw=0,sp=0,si=0;
  lots.forEach(l=>{const ts=timeSummary(l);st+=ts.total;sw+=ts.worked;sp+=ts.paused;si+=ts.idle;});
  return{count:lots.length,total:st/lots.length,worked:sw/lots.length,paused:sp/lots.length,idle:si/lots.length};
}

function getAlerts(){
  return S.lots.filter(l=>{if(['pronto','entrega','entregue'].includes(l.sector))return false;return timeInSector(l)>7200000;});
}

// ── CHART HELPER ────────────────────────────────────────
function renderChart(id,type,data,options={}){
  const ctx=document.getElementById(id);
  if(!ctx)return;
  if(_charts[id]){_charts[id].destroy();delete _charts[id];}
  const defaults={
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#6ea8e0',boxWidth:12,font:{size:11}}},tooltip:{backgroundColor:'rgba(6,15,35,.9)',titleColor:'#e8f4ff',bodyColor:'#6ea8e0'}},
    scales:{x:{ticks:{color:'#3a5f8a',font:{size:10}},grid:{color:'rgba(22,45,85,.5)'}},y:{ticks:{color:'#3a5f8a',font:{size:10}},grid:{color:'rgba(22,45,85,.5)'}}}
  };
  // deep merge plugins/scales
  const merged={...defaults,...options};
  if(options.plugins) merged.plugins={...defaults.plugins,...options.plugins};
  if(options.scales)  merged.scales={...defaults.scales,...options.scales};
  if(type==='doughnut'||type==='pie'){delete merged.scales;}
  _charts[id]=new Chart(ctx,{type,data,options:merged});
}

// ── SLIDE NAVIGATION ────────────────────────────────────
let _slideDefs = [];
let _progressFill = null;

function renderSlides(){
  _slideDefs = buildSlides();
  const area = document.getElementById('slideArea');
  const prog = document.getElementById('slideProgress');

  area.innerHTML = _slideDefs.map((s,i)=>`
    <div class="slide${i===0?' active':''}" id="${s.id}">
      ${s.html}
    </div>
  `).join('');

  prog.innerHTML = _slideDefs.map((_,i)=>`
    <div class="sp-bar${i===0?'':''}" id="sp-${i}"><div class="sp-fill" id="spf-${i}"></div></div>
  `).join('');

  _slideIndex=0;
  _slideDefs[0]?.afterRender?.();
  startProgress();
}

function startProgress(){
  stopProgress();
  const spf=document.getElementById(`spf-${_slideIndex}`);
  if(!spf)return;
  spf.style.transition='none';spf.style.width='0%';
  requestAnimationFrame(()=>{
    spf.style.transition=`width ${SLIDE_INTERVAL}ms linear`;
    spf.style.width='100%';
  });
  _slideTimer=setTimeout(()=>nextSlide(),SLIDE_INTERVAL);
}

function stopProgress(){
  if(_slideTimer){clearTimeout(_slideTimer);_slideTimer=null;}
}

function nextSlide(){
  goToSlide((_slideIndex+1)%_slideDefs.length);
}

function goToSlide(idx){
  if(idx===_slideIndex)return;
  stopProgress();

  // Mark old as done
  document.getElementById(`sp-${_slideIndex}`)?.classList.add('done');

  // Reset future bars
  for(let i=idx;i<_slideDefs.length;i++){
    const b=document.getElementById(`sp-${i}`);
    if(b){b.classList.remove('done');const f=document.getElementById(`spf-${i}`);if(f){f.style.transition='none';f.style.width='0%';}}
  }

  const oldSlide=document.getElementById(_slideDefs[_slideIndex].id);
  oldSlide?.classList.add('exit');
  setTimeout(()=>oldSlide?.classList.remove('exit'),600);

  const newSlide=document.getElementById(_slideDefs[idx].id);
  if(newSlide){newSlide.classList.remove('exit');newSlide.classList.add('active');}
  if(oldSlide&&oldSlide!==newSlide) oldSlide.classList.remove('active');

  _slideIndex=idx;
  _slideDefs[idx]?.afterRender?.();
  startProgress();
}

// ── FULL RENDER ─────────────────────────────────────────
function render(){
  renderSlides();
  renderBottom();
}

/**
 * Atualiza silenciosamente os dados sem resetar o carrossel.
 * Reconstrói apenas o conteúdo do slide ATUAL e atualiza o bottom bar.
 * Não toca em _slideIndex nem reconstrói o DOM dos outros slides.
 */
function refreshData(){
  try {
    renderBottom();
    // Rebuild o HTML do slide atual in-place (apenas dados, sem animação)
    _slideDefs = buildSlides(); // recalcula dados mas sem renderizar no DOM
    const current = _slideDefs[_slideIndex];
    if (!current) return;
    const el = document.getElementById(current.id);
    if (!el) return;
    // Atualiza apenas o conteúdo interno do slide ativo
    el.innerHTML = current.html;
    // Re-executa o afterRender para atualizar os gráficos
    setTimeout(() => { try { current.afterRender?.(); } catch(e){} }, 50);
  } catch(e) { console.warn('refreshData erro:', e); }
}

/** Login rápido com o usuário tv_painel / tv2025 */
async function quickTvLogin(){
  const btn = document.querySelector('[onclick="quickTvLogin()"]');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Conectando...'; }
  try{
    const users = await apiGet('ff_users');
    const user  = users.find(u => u.login === 'tv_painel' && verifyPwd('tv2025', u.password));
    if(!user){
      document.getElementById('authError').textContent = 'Usuário tv_painel não encontrado ou senha incorreta. Verifique se o usuário foi criado no sistema.';
      document.getElementById('authError').style.display='block';
      return;
    }
    // Re-hasha se ainda for texto puro
    if(user.password && !user.password.includes(':')){
      try{
        const hashed = hashFnv(user.password);
        await fetch(`${API}ff_users/${user.id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:hashed})});
        user.password = hashed;
      }catch(_){}
    }
    S.currentUser=user;
    document.getElementById('authScreen').style.display='none';
    await init();
  }catch(err){
    document.getElementById('authError').textContent='Erro ao conectar: '+err.message;
    document.getElementById('authError').style.display='block';
  }finally{
    if(btn){ btn.disabled=false; btn.innerHTML='<i class="fas fa-play-circle"></i> Abrir Painel TV (tv_painel)'; }
  }
}

async function handleLogin(e){
  e.preventDefault();
  const login=document.getElementById('authUser').value.trim();
  const pass =document.getElementById('authPass').value;
  const errEl=document.getElementById('authError');
  errEl.style.display='none';
  try{
    const users=await apiGet('ff_users');
    const user=users.find(u=>u.login===login&&verifyPwd(pass,u.password));
    if(!user||!['admin','diretoria','pcp','pcp_lib','manager','tv'].includes(user.role)){
      errEl.textContent='Usuário ou senha inválidos.';
      errEl.style.display='block';return;
    }
    // Re-hasha senha legada (texto puro) automaticamente
    if(user.password && !user.password.includes(':')){
      try{
        const hashed = hashFnv(user.password);
        await fetch(`${API}ff_users/${user.id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:hashed})});
        user.password = hashed;
      }catch(_){}
    }
    S.currentUser=user;
    document.getElementById('authScreen').style.display='none';
    await init();
  }catch(err){
    errEl.textContent='Erro ao conectar: '+err.message;
    errEl.style.display='block';
  }
}

    document.getElementById('app').style.display='grid';
    render();
    // Auto-refresh: atualiza dados sem resetar o carrossel de slides
    setInterval(async()=>{
      try{await loadData();refreshData();}catch(e){}
    },10000);
  }catch(err){
    document.getElementById('loadingScreen').innerHTML=`
      <div style="color:var(--red2);font-size:2rem"><i class="fas fa-exclamation-triangle"></i></div>
      <div class="loading-text" style="color:var(--red2)">Erro: ${esc(err.message)}</div>
      <a href="index.html" style="color:var(--blue2);font-size:.82rem;margin-top:.5rem">← Voltar</a>`;
  }
}

// ── STARTUP ──────────────────────────────────────────────
(async()=>{
  updateClock();setInterval(updateClock,1000);
  // Sess\u00e3o apenas em mem\u00f3ria: sempre mostra login
  document.getElementById('authScreen').style.display='flex';
})();
</script>
</body>
</html>
